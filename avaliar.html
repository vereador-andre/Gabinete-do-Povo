<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliar - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #f1f5f9; text-align: center; }
        .header { background: #1e3a8a; color: white; padding: 30px; border-radius: 0 0 30px 30px; }
        .container { padding: 30px 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 12px; padding: 15px; box-sizing: border-box; margin-top: 15px; font-family: 'Poppins'; outline: none; }
        .btn-enviar { background: #22c55e; color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 600; width: 100%; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <i class="material-icons" onclick="history.back()" style="float:left; cursor:pointer">arrow_back</i>
        <span>Avaliação do Mandato</span>
    </div>
    <div class="container">
        <div class="card">
            <h3>Sua opinião é fundamental!</h3>
            <textarea id="textoAvaliacao" rows="6" placeholder="Escreva aqui..."></textarea>
            <button id="btnEnviar" class="btn-enviar" onclick="enviarAvaliacao()">Enviar Avaliação</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        function enviarAvaliacao() {
            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            db.collection("avaliacoes_mandato").add({
                mensagem: document.getElementById('textoAvaliacao').value,
                data: new Date().toLocaleDateString('pt-BR')
            }).then(() => {
                alert("Enviado com sucesso!");
                window.location.href = "app.html";
            }).catch((e) => { alert("Erro: " + e.message); btn.disabled = false; });
        }
    </script>
</body>
</html>
