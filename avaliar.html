<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5PL1D78HGL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5PL1D78HGL');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliar Mandato</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #f1f5f9; text-align: center; }
        .header { background: #1e3a8a; color: white; padding: 30px; border-radius: 0 0 30px 30px; }
        .container { padding: 30px 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 12px; padding: 15px; font-family: 'Poppins'; box-sizing: border-box; margin-top: 15px; font-size: 14px; outline: none; }
        .btn-enviar { background: #22c55e; color: white; border: none; padding: 18px; border-radius: 15px; font-weight: 600; width: 100%; margin-top: 20px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-enviar:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="header">
        <i class="material-icons" onclick="history.back()" style="float:left; cursor:pointer">arrow_back</i>
        <span style="font-weight:600">Avaliação do Mandato</span>
    </div>
    <div class="container">
        <div class="card">
            <i class="material-icons" style="font-size:60px; color:#f59e0b;">stars</i>
            <h3>Sua opinião é fundamental!</h3>
            <p style="font-size:13px; color:#64748b;">Deixe sua avaliação abaixo para o gabinete do vereador André de Dedé.</p>
            <textarea id="textoAvaliacao" rows="6" placeholder="Escreva aqui..."></textarea>
            <button id="btnEnviar" class="btn-enviar" onclick="enviarAvaliacao()">Enviar Avaliação</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", 
            authDomain: "gabinete-do-povo.firebaseapp.com", 
            projectId: "gabinete-do-povo" 
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        async function enviarAvaliacao() {
            const texto = document.getElementById('textoAvaliacao').value;
            const btn = document.getElementById('btnEnviar');
            if (texto.trim() === "") { alert("Por favor, escreva algo."); return; }
            btn.disabled = true;
            btn.innerText = "Enviando...";

            try {
                await db.collection("avaliacoes_mandato").add({
                    mensagem: texto,
                    criadoEm: firebase.firestore.FieldValue.serverTimestamp(),
                    data: new Date().toLocaleDateString('pt-BR')
                });
                alert("Obrigado! Avaliação enviada.");
                window.location.href = "app.html";
            } catch (error) {
                alert("Erro ao enviar.");
                btn.disabled = false;
                btn.innerText = "Enviar Avaliação";
            }
        }
    </script>
</body>
</html>
