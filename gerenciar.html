<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Conteúdo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; color: #1e3a8a; text-transform: capitalize; }
        .card-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .info h4 { margin: 0; color: #1e3a8a; font-size: 14px; }
        .info p { margin: 5px 0 0; font-size: 11px; color: #64748b; }
        .actions { display: flex; gap: 10px; }
        .btn-edit { color: #3b82f6; cursor: pointer; }
        .btn-del { color: #ef4444; cursor: pointer; }
        .btn-voltar { display: inline-flex; align-items: center; text-decoration: none; color: #1e3a8a; font-weight: 600; margin-bottom: 20px; }
    </style>
</head>
<body>

<a href="admin.html" class="btn-voltar"><i class="material-icons">arrow_back</i> Painel</a>
<div class="header">
    <h2 id="nomeColecao">Carregando...</h2>
</div>

<div id="listaItens"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Pega o nome da coleção pela URL (ex: ?col=noticias)
    const urlParams = new URLSearchParams(window.location.search);
    const col = urlParams.get('col');
    document.getElementById("nomeColecao").innerText = col.replace(/-/g, ' ');

    // Carrega os itens
    db.collection(col).orderBy("data", "desc").onSnapshot(s => {
        const lista = document.getElementById("listaItens");
        lista.innerHTML = "";
        s.forEach(doc => {
            const data = doc.data();
            lista.innerHTML += `
                <div class="card-item">
                    <div class="info">
                        <h4>${data.titulo}</h4>
                        <p>${data.data.split('-').reverse().join('/')}</p>
                    </div>
                    <div class="actions">
                        <i class="material-icons btn-edit" onclick="editar('${doc.id}')">edit</i>
                        <i class="material-icons btn-del" onclick="excluir('${doc.id}')">delete</i>
                    </div>
                </div>`;
        });
    });

    function excluir(id) {
        if(confirm("Tem certeza que deseja excluir permanentemente?")) {
            db.collection(col).doc(id).delete();
        }
    }

    function editar(id) {
        // Redireciona para uma página de edição passando a coleção e o ID
        window.location.href = `editar.html?col=${col}&id=${id}`;
    }
</script>
</body>
</html>
