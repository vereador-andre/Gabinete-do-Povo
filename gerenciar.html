<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Conteúdo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; }
        .topo { background:#1e293b; color:white; padding:20px; display:flex; align-items:center; gap:15px; }
        .container { padding: 15px; }
        .item-lista { 
            background:white; padding:15px; border-radius:12px; margin-bottom:10px; 
            display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 5px rgba(0,0,0,0.05);
        }
        .btns-group { display: flex; gap: 10px; }
        .btn-action { border:none; background:none; cursor:pointer; padding: 8px; border-radius: 8px; }
        .btn-edit { color:#3b82f6; background: #eff6ff; }
        .btn-del { color:#ef4444; background: #fee2e2; }

        /* Estilo para a Edição (Modal Simples) */
        #modalEdicao {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; }
        .modal-content h3 { margin-top: 0; color: #1e3a8a; font-size: 18px; }
        .modal-content label { font-size: 12px; font-weight: 600; color: #64748b; }
        .modal-content input, .modal-content textarea { 
            width: 100%; padding: 10px; margin: 8px 0 15px; border-radius: 8px; 
            border: 1px solid #e2e8f0; font-family: inherit; box-sizing: border-box;
        }
        .modal-content textarea { height: 100px; resize: none; }
        .btn-save { width: 100%; background: #1e3a8a; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="topo">
    <i class="material-icons" onclick="location.href='admin.html'">arrow_back</i>
    <span id="titulo-gerenciar">Gerenciar</span>
</div>

<div class="container" id="lista-itens">Carregando...</div>

<div id="modalEdicao">
    <div class="modal-content">
        <h3>Editar Conteúdo</h3>
        <input type="hidden" id="editId">
        
        <label>Título / Nome</label>
        <input type="text" id="editTitulo">

        <label>Descrição / Texto</label>
        <textarea id="editTexto"></textarea>

        <button class="btn-save" onclick="salvarEdicao()">Salvar Alterações</button>
        <button onclick="fecharModal()" style="width:100%; background:none; border:none; color:#64748b; margin-top:10px; font-size:12px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const colecao = urlParams.get('col');
    document.getElementById('titulo-gerenciar').innerText = "Gerenciar " + colecao.toUpperCase();

    // Carregar Lista
    db.collection(colecao).orderBy("criadoEm", "desc").onSnapshot(snapshot => {
        const lista = document.getElementById("lista-itens");
        lista.innerHTML = "";
        snapshot.forEach(doc => {
            const item = doc.data();
            lista.innerHTML += `
                <div class="item-lista">
                    <div style="flex:1; padding-right:10px;">
                        <strong style="font-size:14px; color:#1e3a8a;">${item.titulo || 'Sem Título'}</strong><br>
                        <small style="color:#94a3b8;">${item.data}</small>
                    </div>
                    <div class="btns-group">
                        <button class="btn-action btn-edit" onclick="abrirModal('${doc.id}', '${item.titulo || ''}', '${item.descricao || item.texto || ''}')">
                            <i class="material-icons">edit</i>
                        </button>
                        <button class="btn-action btn-del" onclick="excluir('${doc.id}')">
                            <i class="material-icons">delete</i>
                        </button>
                    </div>
                </div>`;
        });
    });

    // Funções do Modal
    function abrirModal(id, titulo, texto) {
        document.getElementById('editId').value = id;
        document.getElementById('editTitulo').value = titulo;
        document.getElementById('editTexto').value = texto;
        document.getElementById('modalEdicao').style.display = 'flex';
    }

    function fecharModal() {
        document.getElementById('modalEdicao').style.display = 'none';
    }

    function salvarEdicao() {
        const id = document.getElementById('editId').value;
        const novoTitulo = document.getElementById('editTitulo').value;
        const novoTexto = document.getElementById('editTexto').value;

        // Atualiza conforme os campos que você usa no banco (ex: titulo e descricao)
        db.collection(colecao).doc(id).update({
            titulo: novoTitulo,
            descricao: novoTexto, // Se você usa 'texto' no cadastro, mude aqui para texto: novoTexto
            texto: novoTexto      // Garante que atualize ambos os nomes comuns de campo
        }).then(() => {
            alert("Atualizado com sucesso!");
            fecharModal();
        });
    }

    function excluir(id) {
        if(confirm("Deseja realmente excluir permanentemente?")) {
            db.collection(colecao).doc(id).delete();
        }
    }
</script>
</body>
</html>
