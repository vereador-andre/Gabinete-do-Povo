<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Conteúdo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; padding: 20px; }
        .topo { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; color: #1e3a8a; }
        .item-lista { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item-info b { display: block; color: #1e3a8a; }
        .item-info span { font-size: 12px; color: #64748b; }
        .btn-delete { color: #ef4444; cursor: pointer; background: #fee2e2; padding: 8px; border-radius: 8px; border: none; }
    </style>
</head>
<body>
<div class="topo"><i class="material-icons" onclick="history.back()">arrow_back</i> <h2>Gerenciar</h2></div>
<div id="listaItens">Carregando...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const colecao = urlParams.get('col'); // Pega qual categoria gerenciar (noticias, acoes, etc)

    db.collection(colecao).orderBy("criadoEm", "desc").onSnapshot(s => {
        const l = document.getElementById("listaItens"); l.innerHTML = "";
        s.forEach(doc => {
            const i = doc.data();
            l.innerHTML += `
                <div class="item-lista">
                    <div class="item-info">
                        <b>${i.titulo}</b>
                        <span>Postado em: ${i.data || '---'}</span>
                    </div>
                    <button class="btn-delete" onclick="apagar('${doc.id}')"><i class="material-icons">delete</i></button>
                </div>`;
        });
    });

    async function apagar(id) {
        if(confirm("Deseja realmente excluir este item?")) {
            await db.collection(colecao).doc(id).delete();
            alert("Excluído com sucesso!");
        }
    }
</script>
</body>
</html>
