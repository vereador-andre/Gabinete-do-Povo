<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Conteúdo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; color: #1e3a8a; text-transform: capitalize; }
        .card-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .info h4 { margin: 0; color: #1e3a8a; font-size: 14px; }
        .info p { margin: 5px 0 0; font-size: 11px; color: #64748b; }
        .actions { display: flex; gap: 10px; }
        .btn-edit { color: #3b82f6; cursor: pointer; }
        .btn-del { color: #ef4444; cursor: pointer; }
        .btn-voltar { display: inline-flex; align-items: center; text-decoration: none; color: #1e3a8a; font-weight: 600; margin-bottom: 20px; }
    </style>
</head>
<body>

<a href="admin.html" class="btn-voltar"><i class="material-icons">arrow_back</i> Painel</a>
<div class="header">
    <h2 id="nomeColecao">Carregando...</h2>
</div>

<div id="listaItens"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", 
        authDomain: "gabinete-do-povo.firebaseapp.com", 
        projectId: "gabinete-do-povo" 
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const auth = firebase.auth();

    // Pega o nome da coleção pela URL
    const urlParams = new URLSearchParams(window.location.search);
    const col = urlParams.get('col');
    if (col) {
        document.getElementById("nomeColecao").innerText = col.replace(/-/g, ' ');
    }

    // Carrega os itens e atualiza em tempo real
    function carregarDados() {
        if (!col) return;
        
        db.collection(col).orderBy("data", "desc").onSnapshot(s => {
            const lista = document.getElementById("listaItens");
            lista.innerHTML = "";
            s.forEach(doc => {
                const data = doc.data();
                // Formatação simples da data para exibição
                const dataExibicao = data.data ? data.data.split('-').reverse().join('/') : '--/--/----';
                
                lista.innerHTML += `
                    <div class="card-item">
                        <div class="info">
                            <h4>${data.titulo || 'Sem título'}</h4>
                            <p>${dataExibicao}</p>
                        </div>
                        <div class="actions">
                            <i class="material-icons btn-edit" onclick="editar('${doc.id}')">edit</i>
                            <i class="material-icons btn-del" onclick="excluir('${doc.id}')">delete</i>
                        </div>
                    </div>`;
            });
        }, error => {
            console.error("Erro ao carregar dados:", error);
            if (error.code === 'permission-denied') {
                alert("Você não tem permissão para ver estes dados. Verifique se está logado.");
            }
        });
    }

    async function excluir(id) {
        // Verifica se o usuário está logado antes de tentar deletar
        const user = auth.currentUser;
        if (!user) {
            alert("Sessão expirada. Faça login novamente.");
            window.location.href = "login.html";
            return;
        }

        if(confirm("Tem certeza que deseja excluir permanentemente?")) {
            try {
                await db.collection(col).doc(id).delete();
                alert("Excluído com sucesso!");
            } catch (error) {
                console.error("Erro ao excluir:", error);
                alert("Erro ao excluir: " + error.message);
            }
        }
    }

    function editar(id) {
        window.location.href = `editar.html?col=${col}&id=${id}`;
    }

    // Só inicia o carregamento quando o Firebase confirmar o estado da autenticação
    auth.onAuthStateChanged(user => {
        if (user) {
            carregarDados();
        } else {
            // Se não estiver logado pelo Firebase, mas o localStorage diz que sim, 
            // ainda assim precisamos do login do Firebase para as permissões
            window.location.href = "login.html";
        }
    });
</script>
</body>
</html>
