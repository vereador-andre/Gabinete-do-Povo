<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessões Extraordinárias</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; }
        .topo { background:#1e3a8a; color:white; padding:20px; text-align:center; border-radius:0 0 25px 25px; }
        .lista-videos { padding: 20px; }
        .video-card { background: white; border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border:none; }
        .info { padding: 15px; }
        .info h3 { margin: 0; font-size: 16px; color: #1e3a8a; }
        .info p { margin: 5px 0 0; font-size: 12px; color: #64748b; }
        .btn-voltar { color: white; text-decoration: none; font-size: 14px; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="topo">
    <h2 style="margin:0">Sessões Extraordinárias</h2>
    <a href="index.html" class="btn-voltar">← Voltar ao Início</a>
</div>

<div class="lista-videos" id="listaExtraordinarias">
    <p style="text-align:center">Carregando sessões...</p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("sessoes")
      .where("tipo", "==", "extraordinaria")
      .orderBy("criadoEm", "desc")
      .get()
      .then(snapshot => {
        const container = document.getElementById("listaExtraordinarias");
        container.innerHTML = "";
        if(snapshot.empty) {
            container.innerHTML = "<p style='text-align:center'>Nenhuma sessão registrada.</p>";
            return;
        }
        snapshot.forEach(doc => {
            let s = doc.data();
            let videoID = s.link.includes('v=') ? s.link.split('v=')[1].split('&')[0] : s.link.split('/').pop();
            container.innerHTML += `
                <div class="video-card">
                    <div class="video-container"><iframe src="https://www.youtube.com/embed/${videoID}" allowfullscreen></iframe></div>
                    <div class="info"><h3>${s.titulo}</h3><p>${s.data}</p></div>
                </div>`;
        });
    });
</script>
</body>
</html>
