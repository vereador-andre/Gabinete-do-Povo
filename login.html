<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#1e3a8a; display:flex; align-items:center; justify-content:center; height:100vh; color: #0f172a; }
        .login-card { background: white; padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .login-card i { font-size: 50px; color: #1e3a8a; margin-bottom: 10px; }
        h2 { margin: 0 0 10px; font-size: 22px; }
        p { font-size: 14px; color: #64748b; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; box-sizing: border-box; font-family: inherit; outline: none; transition: 0.3s; }
        input:focus { border-color: #1e3a8a; box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1); }
        .btn-entrar { width: 100%; background: #1e3a8a; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-entrar:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-voltar { display: block; margin-top: 20px; color: #94a3b8; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

<div class="login-card">
    <i class="material-icons">lock</i>
    <h2>Área Restrita</h2>
    <p>Acesso exclusivo para gestão.</p>
    <input type="password" id="senha" placeholder="Digite a senha" onkeypress="if(event.key === 'Enter') verificar()">
    <button class="btn-entrar" id="btnEntrar" onclick="verificar()">Entrar no Painel</button>
    <a href="index.html" class="btn-voltar">Voltar para o início</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", 
        authDomain: "gabinete-do-povo.firebaseapp.com", 
        projectId: "gabinete-do-povo" 
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();

    // Ativa persistência offline para permitir login mesmo com instabilidade de rede
    db.settings({ persistence: true });

    async function verificar() {
        const btn = document.getElementById("btnEntrar");
        const senhaDigitada = document.getElementById("senha").value;
        
        if (!senhaDigitada) return alert("Por favor, digite a senha.");

        btn.innerText = "Verificando...";
        btn.disabled = true;

        try {
            // Busca a senha definida no alterar-senha.html
            const doc = await db.collection("configuracoes").doc("acesso").get();
            
            let senhaCorreta = "1234"; // Senha padrão inicial

            if (doc.exists) {
                senhaCorreta = doc.data().senha;
            }

            if(senhaDigitada === senhaCorreta) { 
                localStorage.setItem("logado", "true");
                window.location.href = "admin.html";
            } else {
                alert("Senha incorreta!");
                btn.innerText = "Entrar no Painel";
                btn.disabled = false;
            }
        } catch (error) {
            console.error("Erro no login:", error);
            // Se estiver offline e o dado não estiver em cache, avisa o usuário
            alert("Erro de conexão ou acesso não autorizado.");
            btn.innerText = "Entrar no Painel";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
