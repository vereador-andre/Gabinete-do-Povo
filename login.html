<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#1e3a8a; display:flex; align-items:center; justify-content:center; height:100vh; color: #0f172a; }
        .login-card { background: white; padding: 40px 30px; border-radius: 30px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .login-card i { font-size: 50px; color: #1e3a8a; margin-bottom: 10px; }
        h2 { margin: 0 0 10px; font-size: 22px; }
        p { font-size: 14px; color: #64748b; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0; background: #f8fafc; box-sizing: border-box; font-family: inherit; outline: none; transition: 0.3s; }
        .btn-entrar { width: 100%; background: #1e3a8a; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-entrar:disabled { background: #94a3b8; }
        .btn-voltar { display: block; margin-top: 20px; color: #94a3b8; text-decoration: none; font-size: 13px; }
        .link-esqueci { display: block; margin-top: 15px; font-size: 12px; color: #1e3a8a; text-decoration: none; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-card">
    <i class="material-icons">lock</i>
    <h2>Área Restrita</h2>
    <p>Acesso exclusivo para gestão.</p>
    
    <input type="email" id="email" placeholder="Seu e-mail cadastrado">
    <input type="password" id="senha" placeholder="Sua senha" onkeypress="if(event.key === 'Enter') entrar()">
    
    <button class="btn-entrar" id="btnEntrar" onclick="entrar()">Entrar no Painel</button>
    
    <span class="link-esqueci" onclick="recuperarSenha()">Esqueci minha senha</span>
    
    <a href="index.html" class="btn-voltar">Voltar para o início</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc",
      authDomain: "gabinete-do-povo.firebaseapp.com",
      projectId: "gabinete-do-povo",
      storageBucket: "gabinete-do-povo.firebasestorage.app",
      messagingSenderId: "450444313568",
      appId: "1:450444313568:web:e12ba742d940dc23e52185"
    };

    // Inicialização correta para a versão 8
    if (!firebase.apps.length) { 
        firebase.initializeApp(firebaseConfig); 
    }
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Função para Logar
    async function entrar() {
        const email = document.getElementById("email").value;
        const senha = document.getElementById("senha").value;
        const btn = document.getElementById("btnEntrar");

        if (!email || !senha) return alert("Preencha e-mail e senha.");

        btn.innerText = "Verificando...";
        btn.disabled = true;

        try {
            await auth.signInWithEmailAndPassword(email, senha);
            localStorage.setItem("logado", "true");
            window.location.href = "admin.html";
        } catch (error) {
            alert("Erro: E-mail ou senha inválidos.");
            btn.innerText = "Entrar no Painel";
            btn.disabled = false;
        }
    }

    // Função de Recuperação de Senha (Sem precisar mexer no código)
    function recuperarSenha() {
        const email = document.getElementById("email").value;
        if (!email) return alert("Digite seu e-mail primeiro para receber o link de recuperação.");

        auth.sendPasswordResetEmail(email)
            .then(() => alert("Um link de redefinição foi enviado para o seu e-mail!"))
            .catch(error => alert("Erro: Verifique se o e-mail está correto."));
    }
</script>

</body>
</html>
