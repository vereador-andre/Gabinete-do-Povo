<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requerimentos - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --bg: #f8fafc; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); padding-bottom: 140px; }
        .topo { background: var(--primary); color: white; padding: 20px; display: flex; align-items: center; gap: 15px; border-radius: 0 0 25px 25px; }
        .container { padding: 20px 15px; }
        .req-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; border-left: 5px solid #3b82f6; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .req-numero { font-size: 11px; font-weight: 700; color: #3b82f6; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .req-titulo { font-size: 16px; font-weight: 600; color: var(--primary); margin-bottom: 8px; }
        .req-desc { font-size: 13px; color: #475569; line-height: 1.5; }
        .req-footer { margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #f1f5f9; pt: 10px; }
        .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; background: #e0f2fe; color: #0369a1; font-weight: 600; }
    </style>
</head>
<body>
<div class="topo"><i class="material-icons" onclick="history.back()">arrow_back</i><span>Requerimentos</span></div>
<div class="container" id="lista-requerimentos">Carregando...</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    db.collection("requerimentos").orderBy("criadoEm", "desc").onSnapshot(s => {
        const l = document.getElementById("lista-requerimentos"); l.innerHTML = "";
        s.forEach(d => {
            const i = d.data();
            l.innerHTML += `
                <div class="req-card">
                    <span class="req-numero">Protocolo: ${i.numero || '---'}</span>
                    <div class="req-titulo">${i.titulo}</div>
                    <div class="req-desc">${i.descricao || i.texto || ''}</div>
                    <div class="req-footer">
                        <span class="status-badge">Oficiado</span>
                        <span style="font-size:11px; color:#94a3b8">${i.data || ''}</span>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
