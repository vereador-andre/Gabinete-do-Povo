<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ações Atendidas - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 80px; }
        .topo { background:#1e3a8a; color:white; padding:20px; display:flex; align-items:center; gap:15px; border-radius:0 0 25px 25px; position: sticky; top: 0; z-index: 100; }
        .btn-voltar { cursor:pointer; background:rgba(255,255,255,0.2); border-radius:10px; padding:8px; display:flex; }
        .conteudo { padding: 20px; }
        .card { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card img, .card iframe { width: 100%; height: 200px; object-fit: cover; border: none; }
        .card-body { padding: 20px; }
        .card-data { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card-titulo { font-size: 18px; color: #1e3a8a; font-weight: 600; margin-bottom: 10px; line-height: 1.3; }
        .card-texto { font-size: 14px; color: #475569; line-height: 1.6; white-space: pre-wrap; }
        
        /* Rodapé Redes Sociais */
        .footer-social { text-align: center; padding: 20px; background: white; margin-top: 20px; border-radius: 25px 25px 0 0; }
        .social-icons { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .social-icons a { color: #1e3a8a; font-size: 24px; text-decoration: none; }
        .btn-whatsapp { background: #25d366; color: white; padding: 12px 25px; border-radius: 30px; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="topo">
        <div class="btn-voltar" onclick="history.back()"><i class="material-icons">arrow_back</i></div>
        <div style="font-weight:600">Ações Atendidas</div>
    </div>

    <div class="conteudo" id="listaAcoes"></div>

    <div class="footer-social">
        <p style="font-size: 14px; color: #64748b; margin: 0;">Siga nossas redes sociais</p>
        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-tiktok"></i></a>
        </div>
        <a href="https://wa.me/SEUNUMERO" class="btn-whatsapp"><i class="fa-brands fa-whatsapp"></i> Falar no Gabinete</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        db.collection("acoes-atendidas").orderBy("criadoEm", "desc").get().then((snapshot) => {
            const container = document.getElementById("listaAcoes");
            container.innerHTML = "";
            if (snapshot.empty) {
                container.innerHTML = '<div style="text-align:center;padding:50px;color:#94a3b8;">Nenhuma ação registrada.</div>';
                return;
            }
            snapshot.forEach((doc) => {
                const acao = doc.data();
                container.innerHTML += `
                    <div class="card">
                        ${acao.imagem ? `<img src="${acao.imagem}">` : ''}
                        <div class="card-body">
                            <span class="card-data">${acao.data}</span>
                            <div class="card-titulo">${acao.titulo}</div>
                            <div class="card-texto">${acao.texto}</div>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
