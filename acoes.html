<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ações Atendidas - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 30px; }
        
        /* Topo Padrão */
        .topo { background:#1e3a8a; color:white; padding:20px; display:flex; align-items:center; gap:15px; border-radius:0 0 25px 25px; position: sticky; top: 0; z-index: 100; }
        .btn-voltar { cursor:pointer; background:rgba(255,255,255,0.2); border-radius:10px; padding:8px; display:flex; }
        
        .conteudo { padding: 20px; }
        
        /* Card Padrão igual às Notícias */
        .card { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card img, .card iframe { width: 100%; height: 200px; object-fit: cover; border: none; }
        
        .card-body { padding: 20px; }
        .card-data { font-size: 12px; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card-titulo { font-size: 18px; color: #1e3a8a; font-weight: 600; margin-bottom: 10px; line-height: 1.3; }
        .card-texto { font-size: 14px; color: #475569; line-height: 1.6; white-space: pre-wrap; }

        .vazio { text-align: center; padding: 50px; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="topo">
        <div class="btn-voltar" onclick="history.back()"><i class="material-icons">arrow_back</i></div>
        <div style="font-weight:600">Ações Atendidas</div>
    </div>

    <div class="conteudo" id="listaAcoes">
        </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", 
            authDomain: "gabinete-do-povo.firebaseapp.com", 
            projectId: "gabinete-do-povo" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function extrairVideoID(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        db.collection("acoes-atendidas").orderBy("criadoEm", "desc").get().then((snapshot) => {
            const container = document.getElementById("listaAcoes");
            container.innerHTML = "";

            if (snapshot.empty) {
                container.innerHTML = '<div class="vazio"><i class="material-icons" style="font-size:48px">inventory_2</i><p>Nenhuma ação registrada ainda.</p></div>';
                return;
            }

            snapshot.forEach((doc) => {
                const acao = doc.data();
                let midiaHTML = "";
                const videoId = extrairVideoID(acao.imagem);

                if (videoId) {
                    midiaHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
                } else if (acao.imagem && acao.imagem.startsWith('http')) {
                    midiaHTML = `<img src="${acao.imagem}" alt="Imagem da Ação">`;
                }

                container.innerHTML += `
                    <div class="card">
                        ${midiaHTML}
                        <div class="card-body">
                            <span class="card-data">${acao.data}</span>
                            <div class="card-titulo">${acao.titulo}</div>
                            <div class="card-texto">${acao.texto}</div>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
