<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ações do Mandato</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

/* TOPO */
.topo {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:25px;
}

.voltar {
  background:#1e293b;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  font-size:18px;
  transition:0.2s;
}

.voltar:active {
  transform:scale(0.95);
}

.titulo-topo {
  font-size:18px;
  font-weight:600;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:15px;
  height:calc(100vh - 100px);
}
  
/* CARDS */
.card {
  background:rgba(255,255,255,0.06);
  border-radius:20px;
  padding:20px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  height:140px;
}
  
</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="voltar" onclick="voltar()">←</div>
  <div class="titulo-topo">Ações do Mandato</div>
</div>

<div class="grid">

  <div class="card" onclick="ir('indicacoes.html')">
  <div class="material-icons icon">place</div>
  Indicações
</div>

<div class="card" onclick="ir('requerimentos.html')">
  <div class="material-icons icon">description</div>
  Requerimentos
</div>

<div class="card" onclick="ir('projetos.html')">
  <div class="material-icons icon">gavel</div>
  Projetos de Lei
</div>

<div class="card">
  <div class="material-icons icon">check_circle</div>
  Ações Atendidas
</div>
  
</div>
  
<script>
function ir(pagina){
  window.location.href = pagina;
}

function voltar(){
  window.history.back();
}
</script>

</body>
</html>
