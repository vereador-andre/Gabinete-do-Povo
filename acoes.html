<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ações Atendidas - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 30px; }
        .topo { background:#1e3a8a; color:white; padding:20px; display:flex; align-items:center; gap:15px; border-radius:0 0 25px 25px; position: sticky; top: 0; z-index: 100; }
        .btn-voltar { cursor:pointer; background:rgba(255,255,255,0.2); border-radius:10px; padding:8px; display:flex; }
        .conteudo { padding: 20px; }
        .card { background: white; border-radius: 20px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card img, .card iframe { width: 100%; height: 210px; object-fit: cover; border: none; }
        .card-body { padding: 20px; }
        .card-data { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card-titulo { font-size: 18px; color: #1e3a8a; font-weight: 600; margin-bottom: 12px; line-height: 1.3; }
        .card-texto { font-size: 14px; color: #475569; line-height: 1.6; white-space: pre-wrap; margin-bottom: 20px; }
        
        /* Redes Sociais Iguais às Notícias */
        .social-share { display: flex; gap: 10px; border-top: 1px solid #f1f5f9; padding-top: 15px; }
        .social-share a { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            padding: 10px; border-radius: 10px; text-decoration: none; font-size: 18px; transition: 0.3s;
        }
        .btn-inst { background: #E1306C; color: white; }
        .btn-face { background: #4267B2; color: white; }
        .btn-tik { background: #000000; color: white; }
        .vazio { text-align: center; padding: 50px; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="topo">
        <div class="btn-voltar" onclick="history.back()"><i class="material-icons">arrow_back</i></div>
        <div style="font-weight:600">Ações Atendidas</div>
    </div>
    <div class="conteudo" id="listaAcoes"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function extrairVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url ? url.match(regExp) : null;
            return (match && match[2].length === 11) ? match[2] : null;
        }

        db.collection("acoes-atendidas").orderBy("criadoEm", "desc").get().then((snapshot) => {
            const container = document.getElementById("listaAcoes");
            container.innerHTML = "";
            if (snapshot.empty) {
                container.innerHTML = '<div class="vazio"><i class="material-icons" style="font-size:48px">inventory_2</i><p>Aguardando primeiras ações...</p></div>';
                return;
            }
            snapshot.forEach((doc) => {
                const acao = doc.data();
                const vId = extrairVideoID(acao.imagem);
                let midia = vId ? `<iframe src="https://www.youtube.com/embed/${vId}" allowfullscreen></iframe>` : 
                            (acao.imagem ? `<img src="${acao.imagem}">` : '');

                container.innerHTML += `
                    <div class="card">
                        ${midia}
                        <div class="card-body">
                            <span class="card-data">${acao.data}</span>
                            <div class="card-titulo">${acao.titulo}</div>
                            <div class="card-texto">${acao.texto}</div>
                            <div class="social-share">
                                <a href="https://instagram.com" class="btn-inst"><i class="fab fa-instagram"></i></a>
                                <a href="https://facebook.com" class="btn-face"><i class="fab fa-facebook-f"></i></a>
                                <a href="https://tiktok.com" class="btn-tik"><i class="fab fa-tiktok"></i></a>
                            </div>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
