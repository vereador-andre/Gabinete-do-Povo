<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ações do Mandato</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>

/* BASE */
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(to bottom, #ffffff 70%, #dcfce7);
  color:#0f172a;
  padding:20px;
}

/* TOPO */
.topo {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:25px;
}

.logo-topo {
  width:60px;
}

.titulo-topo {
  font-size:16px;
  font-weight:600;
}

/* BOTÃO VOLTAR */
.voltar {
  background:#1e3a8a;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:10px;
}

/* CARDS */
.card {
  background:white;
  border-radius:20px;
  padding:30px 20px;
  text-align:center;
  box-shadow:0 6px 20px rgba(0,0,0,0.10);
  cursor:pointer;
  transition:0.2s;
}

.card:active {
  transform:scale(0.95);
}

/* ÍCONES */
.icon {
  font-size:45px;
  margin-bottom:10px;
  color:#1e3a8a;
}

/* LOGO FINAL */
.logo-final {
  margin-top:40px;
  text-align:center;
}

.logo-final img {
  width:120px;
  opacity:0.9;
}

</style>
</head>

<body>

<!-- TOPO PADRÃO -->
<div class="topo">
  <div class="voltar" onclick="voltar()">←</div>

  <img src="logo.png" class="logo-topo">

  <div class="titulo-topo">
    Gabinete do Povo
  </div>
</div>

<!-- GRID -->
<div class="grid">

  <div class="card" onclick="ir('indicacoes.html')">
    <div class="material-icons icon">place</div>
    Indicações
  </div>

  <div class="card" onclick="ir('requerimentos.html')">
    <div class="material-icons icon">description</div>
    Requerimentos
  </div>

  <div class="card" onclick="ir('projetos.html')">
    <div class="material-icons icon">gavel</div>
    Projetos de Lei
  </div>

  <div class="card" onclick="ir('acoes-atendidas.html')">
    <div class="material-icons icon">task_alt</div>
    Ações Atendidas
  </div>

</div>

<!-- LOGO FINAL -->
<div class="logo-final">
  <img src="logo.png">
</div>

<script>
function ir(pagina){
  window.location.href = pagina;
}

function voltar(){
  if(history.length > 1){
    window.history.back();
  } else {
    window.location.href = "app.html";
  }
}
</script>

</body>
</html>
