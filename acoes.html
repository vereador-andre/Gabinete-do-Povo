<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ações Atendidas - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 120px; }
        .topo { background:#1e3a8a; color:white; padding:20px; display:flex; align-items:center; gap:15px; position:sticky; top:0; z-index:100; border-radius:0 0 20px 20px; }
        .container { padding: 15px; }
        .card { background:white; border-radius:20px; overflow:hidden; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,0.05); }
        .card img, .card iframe { width:100%; border:none; display:block; object-fit: cover; }
        .card-body { padding:15px; }
        .card-data { font-size:11px; color:#94a3b8; font-weight:600; text-transform:uppercase; }
        .card-titulo { font-size:16px; color:#1e3a8a; font-weight:600; margin:5px 0; }
        .card-texto { font-size:13px; color:#475569; line-height:1.5; }
        .btn-compartilhar { display:flex; align-items:center; justify-content:center; gap:8px; background:#f8fafc; color:#1e3a8a; border:1px solid #e2e8f0; padding:10px; border-radius:12px; margin-top:15px; cursor:pointer; font-weight:600; font-size:13px; }
        .rodape-redes { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 15px 0; display: flex; flex-direction: column; align-items: center; box-shadow: 0 -4px 15px rgba(0,0,0,0.1); border-radius: 20px 20px 0 0; z-index: 1000; }
        .rodape-redes p { font-size: 11px; font-weight: 600; color: #64748b; margin: 0 0 10px 0; text-transform: uppercase; }
        .icones-flex { display: flex; gap: 20px; }
        .icones-flex a { text-decoration: none; color: #1e3a8a; background: #eff6ff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="topo">
    <i class="material-icons" onclick="history.back()">arrow_back</i>
    <span>Ações Atendidas</span>
</div>

<div class="container" id="lista-publica">Carregando...</div>

<div class="rodape-redes">
    <p>Siga-nos em nossas redes sociais</p>
    <div class="icones-flex">
        <a href="https://facebook.com/andrekelly.santos" target="_blank"><svg style="width:24px" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2.04C6.5 2.04 2 6.53 2 12.06C2 17.06 5.66 21.21 10.44 21.96V14.96H7.9V12.06H10.44V9.85C10.44 7.34 11.93 5.96 14.22 5.96C15.31 5.96 16.45 6.15 16.45 6.15V8.62H15.19C13.95 8.62 13.56 9.39 13.56 10.18V12.06H16.34L15.89 14.96H13.56V21.96A10 10 0 0 0 22 12.06C22 6.53 17.5 2.04 12 2.04Z"/></svg></a>
        <a href="https://instagram.com/andre.de.dede" target="_blank"><svg style="width:24px" viewBox="0 0 24 24"><path fill="currentColor" d="M7.8,2H16.2C19.4,2 22,4.6 22,7.8V16.2A5.8,5.8 0 0,1 16.2,22H7.8C4.6,22 2,19.4 2,16.2V7.8A5.8,5.8 0 0,1 7.8,2M7.6,4A3.6,3.6 0 0,0 4,7.6V16.4A3.6,3.6 0 0,0 7.6,20H16.4A3.6,3.6 0 0,0 20,16.4V7.6A3.6,3.6 0 0,0 16.4,4H7.6M17.2,4.8A1.2,1.2 0 1,1 16,6A1.2,1.2 0 0,1 17.2,4.8M12,7A5,5 0 1,1 7,12A5,5 0 0,1 12,7M12,9A3,3 0 1,0 15,12A3,3 0 0,0 12,9Z"/></svg></a>
        <a href="https://tiktok.com/@andre_de_dede" target="_blank"><svg style="width:24px" viewBox="0 0 24 24"><path fill="currentColor" d="M17.71,6.15C16.31,5.2 15.43,3.68 15.41,2H12.16V16.14C12.12,17.47 11.02,18.52 9.69,18.48C8.35,18.44 7.3,17.34 7.34,16C7.39,14.67 8.48,13.62 9.81,13.66C10.28,13.67 10.73,13.82 11.12,14.1V10.82C9.17,10.45 7.29,11.33 6.44,13.12C5.59,14.91 5.92,17.06 7.28,18.5C8.63,19.93 10.76,20.35 12.56,19.54C14.36,18.73 15.53,16.82 15.45,14.84V8.58C16.73,9.5 18.25,10 19.82,10V6.75C19.05,6.75 18.32,6.54 17.71,6.15Z"/></svg></a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // COLEÇÃO DE AÇÕES
    db.collection("acoes-atendidas").orderBy("criadoEm", "desc").onSnapshot(snapshot => {
        const lista = document.getElementById("lista-publica");
        lista.innerHTML = "";
        snapshot.forEach(doc => {
            const item = doc.data();
            const t = item.titulo || 'Sem Título';
            const d = item.descricao || item.texto || '';
            let midia = item.imagem || item.link ? `<img src="${item.imagem || item.link}">` : "";

            lista.innerHTML += `
                <div class="card">
                    ${midia}
                    <div class="card-body">
                        <div class="card-data">${item.data || ''}</div>
                        <div class="card-titulo">${t}</div>
                        <div class="card-texto">${d}</div>
                        <div class="btn-compartilhar" onclick="compartilhar('${t.replace(/'/g, "\\'")}', '${d.substring(0,100).replace(/'/g, "\\'")}')">
                            <i class="material-icons" style="font-size:18px">share</i> Compartilhar
                        </div>
                    </div>
                </div>`;
        });
    });

    function compartilhar(titulo, texto) {
        if (navigator.share) { navigator.share({ title: titulo, text: texto, url: window.location.href }); }
    }
</script>
</body>
</html>
