<div class="form-card">
    <h2>Nova Ação Atendida</h2>
    <form id="formAcao">
        <label>Título da Ação</label>
        <input type="text" id="titulo" placeholder="Ex: Reforma da Praça Central" required>

        <label>Data da Realização</label>
        <input type="date" id="data" required>

        <label>Descrição Detalhada</label>
        <textarea id="descricao" rows="4" placeholder="Descreva o que foi feito..."></textarea>

        <label>URL da Imagem (Link Direto)</label>
        <input type="url" id="imagem" placeholder="https://imgur.com/foto.jpg">

        <button type="submit" class="btn-salvar">Publicar Ação</button>
    </form>
    <a href="admin.html" class="btn-voltar">Voltar</a>
</div>

<script>
    // ... config firebase ...
    document.getElementById("formAcao").onsubmit = async (e) => {
        e.preventDefault();
        await db.collection("acoes-atendidas").add({
            titulo: document.getElementById("titulo").value,
            data: document.getElementById("data").value,
            descricao: document.getElementById("descricao").value,
            imagem: document.getElementById("imagem").value,
            criadoEm: firebase.firestore.FieldValue.serverTimestamp()
        });
        alert("Ação cadastrada!");
        window.location.href = "admin.html";
    };
</script>
