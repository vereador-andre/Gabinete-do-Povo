<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Senha - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 30px; }
        .topo { background:#1e3a8a; color:white; padding:20px; display:flex; align-items:center; gap:15px; border-radius:0 0 25px 25px; }
        .btn-voltar { cursor:pointer; background:rgba(255,255,255,0.2); border-radius:10px; padding:8px; display:flex; }
        .form { padding:20px; }
        .card { background:white; padding:25px; border-radius:20px; box-shadow:0 4px 15px rgba(0,0,0,0.05); }
        label { display:block; font-size:12px; font-weight:600; color:#64748b; margin-bottom:8px; }
        input { width:100%; padding:15px; border:1px solid #e2e8f0; border-radius:12px; background:#f8fafc; font-family:inherit; box-sizing:border-box; font-size:16px; margin-bottom:20px; }
        .btn-salvar { width:100%; background:#1e3a8a; color:white; border:none; padding:15px; border-radius:12px; font-weight:600; cursor:pointer; font-size:16px; }
    </style>
</head>
<body>
    <div class="topo">
        <div class="btn-voltar" onclick="history.back()"><i class="material-icons">arrow_back</i></div>
        <div style="font-weight:600">Configurações de Acesso</div>
    </div>
    <div class="form">
        <div class="card">
            <label>Nova Senha do Painel</label>
            <input type="text" id="novaSenha" placeholder="Digite a nova senha">
            <button class="btn-salvar" onclick="atualizarSenha()">Atualizar Senha</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function atualizarSenha() {
            const nova = document.getElementById("novaSenha").value;
            if(nova.length < 4) return alert("A senha deve ter pelo menos 4 caracteres.");

            // Atualiza a senha no documento "acesso" dentro da coleção "configuracoes"
            db.collection("configuracoes").doc("acesso").set({
                senha: nova
            }).then(() => {
                alert("Senha atualizada com sucesso!");
                history.back();
            }).catch(err => alert("Erro ao atualizar: " + err));
        }
    </script>
</body>
</html>
