<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gabinete do Povo</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* TELA INICIAL */
#inicio {
  height:100vh;
  background:linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('fundo.jpg');
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
#inicio h1 {
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:10px;
}

/* MENU */
#menu {
  display:none;
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  background:#16a34a;
  transform:scale(1.05);
}
</style>
</head>

<body>

<div id="inicio" onclick="entrar()">
  <h1>Toque na tela para entrar</h1>
</div>

<div id="menu">
  <h2>Gabinete do Povo</h2>

  <div class="grid">

  <div class="card">📊 Ações do Mandato</div>
  <div class="card">📌 Indicações</div>
  <div class="card">📄 Requerimentos</div>
  <div class="card">⚖️ Projetos de Lei</div>
  <div class="card">📰 Notícias</div>
  <div class="card">🎤 Sessões</div>
  <div class="card">📞 Fale Conosco</div>

</div>
</div>

<script>
function entrar(){
  document.getElementById("inicio").style.display = "none";
  document.getElementById("menu").style.display = "block";
}
</script>

</body>
</html>
