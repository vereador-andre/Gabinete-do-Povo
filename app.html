<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete do Povo - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; color:#0f172a; }
        .header { background:#1e3a8a; color:white; padding:40px 20px; text-align:center; border-radius:0 0 30px 30px; }
        .header img { width:100px; border-radius:50%; border:3px solid white; margin-bottom:10px; }
        .header h1 { margin:0; font-size:22px; }
        .header p { margin:5px 0 0; opacity:0.8; font-size:14px; }

        .menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; padding:20px; margin-top:-20px; }
        .card { background:white; padding:20px; border-radius:20px; text-align:center; box-shadow:0 10px 20px rgba(0,0,0,0.05); cursor:pointer; transition:0.3s; }
        .card:active { transform:scale(0.95); }
        .card i { font-size:35px; color:#1e3a8a; margin-bottom:10px; display:block; }
        .card span { font-weight:600; font-size:13px; }

        .social-bar { display:flex; justify-content:center; gap:20px; padding:20px; }
        .social-bar a { color:#1e3a8a; text-decoration:none; font-size:24px; }

        .btn-admin { text-align:center; padding:20px; margin-top:20px; }
        .btn-admin button { background:none; border:1px solid #cbd5e1; color:#64748b; padding:10px 20px; border-radius:10px; cursor:pointer; font-size:12px; }
        
        /* Estilo especial para o botão de contato principal */
        .card-destaque { grid-column: span 2; background:#22c55e; color:white; }
        .card-destaque i { color:white; }
    </style>
</head>
<body>

    <div class="header">
        <img src="foto-andre.png" alt="Vereador">
        <h1>André de Dedé</h1>
        <p>Gabinete do Povo em Ação</p>
    </div>

    <div class="menu-grid">
        <div class="card" onclick="window.location.href='noticias.html'">
            <i class="material-icons">newspaper</i>
            <span>Notícias</span>
        </div>

        <div class="card" onclick="window.location.href='acoes-realizadas.html'">
            <i class="material-icons">task_alt</i>
            <span>Ações Realizadas</span>
        </div>

        <div class="card" onclick="window.location.href='indicacoes.html'">
            <i class="material-icons">assignment</i>
            <span>Indicações</span>
        </div>

        <div class="card" onclick="window.location.href='requerimentos.html'">
            <i class="material-icons">description</i>
            <span>Requerimentos</span>
        </div>

        <div class="card" onclick="window.location.href='projetos.html'">
            <i class="material-icons">gavel</i>
            <span>Projetos de Lei</span>
        </div>

        <div class="card" onclick="window.location.href='sessoes-ordinarias.html'">
            <i class="material-icons">videocam</i>
            <span>Sessões</span>
        </div>

        <div class="card card-destaque" onclick="window.location.href='contato.html'">
            <i class="material-icons">record_voice_over</i>
            <span>Sua Voz no Gabinete</span>
        </div>
    </div>

    <div class="social-bar">
        <a href="#"><i class="material-icons">facebook</i></a>
        <a href="#"><i class="material-icons">camera_alt</i></a>
        <a href="https://wa.me/seunumerosaqui"><i class="material-icons">whatsapp</i></a>
    </div>

    <div class="btn-admin">
        <button onclick="window.location.href='login.html'">
            <i class="material-icons" style="font-size:14px; vertical-align:middle;">lock</i> 
            Área do Administrador
        </button>
    </div>

</body>
</html>
