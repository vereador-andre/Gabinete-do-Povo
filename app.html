<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gabinete do Povo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0f172a;
  color:white;
}

/* TELA INICIAL */
#inicio {
  height:100vh;
  background:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('fundo.jpg');
  background-size:cover;
  background-position:top center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.titulo {
  font-size:28px;
  font-weight:600;
}

.sub {
  font-size:14px;
  opacity:0.8;
}

.botao-entrar {
  margin-top:25px;
  background:#22c55e;
  padding:15px 30px;
  border-radius:30px;
  font-weight:600;
  cursor:pointer;
}

/* MENU */
#menu {
  display:none;
  min-height:100vh;
  padding:20px;
  background:linear-gradient(rgba(15,23,42,0.95), rgba(15,23,42,0.98)), url('logo.png');
  background-repeat:no-repeat;
  background-position:center;
  background-size:65%;
}

/* HEADER */
.header {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.logo-topo {
  width:45px;
  height:45px;
  border-radius:10px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* CARDS */
.card {
  background:rgba(255,255,255,0.06);
  border-radius:20px;
  padding:25px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:active {
  transform:scale(0.95);
  background:#22c55e;
}

.icon {
  font-size:40px;
  margin-bottom:10px;
}

.texto {
  font-size:15px;
  font-weight:500;
}

/* ANIMAÇÃO */
.fade-in {
  animation:fadeIn 0.5s ease-in;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- INÍCIO -->
<div id="inicio">
  <div class="titulo">Gabinete do Povo</div>
  <div class="sub">Vereador André de Dedé</div>

  <div class="botao-entrar" onclick="entrar()">
    Entrar no Gabinete
  </div>
</div>

<!-- MENU -->
<div id="menu">
<div class="header">
  <img src="logo.png" class="logo-topo">
  <div>
    <div style="font-weight:600;">Gabinete do Povo</div>
    <div style="font-size:12px; color:#94a3b8;">Sua voz agora tem vez</div>
  </div>
</div>

<div class="grid">

  <div class="card" onclick="ir('acoes.html')">
    <div class="material-icons icon">analytics</div>
    <div class="texto">Ações do Mandato</div>
  </div>

  <div class="card">
    <div class="material-icons icon">campaign</div>
    <div class="texto">Notícias</div>
  </div>

  <div class="card">
    <div class="material-icons icon">event</div>
    <div class="texto">Sessões Ordinárias</div>
  </div>

  <div class="card">
    <div class="material-icons icon">groups</div>
    <div class="texto">Sessões Extraordinárias e Solenes</div>
  </div>

  <div class="card">
    <div class="material-icons icon">chat</div>
    <div class="texto">Fale Conosco</div>
  </div>

  <div class="card" onclick="abrirRedes()">
  <div class="material-icons icon">share</div>
  <div class="texto">Seguir nas Redes</div>
</div>
</div>

</div>

<script>

function entrar(){
  document.getElementById("inicio").style.display = "none";
  let menu = document.getElementById("menu");
  menu.style.display = "block";
  menu.classList.add("fade-in");
}

function ir(pagina){
  window.location.href = pagina;
}

function abrirRedes(){
  document.getElementById("modalRedes").style.display = "flex";
}

function fecharRedes(){
  document.getElementById("modalRedes").style.display = "none";
}

</script>
  
  <div id="modalRedes" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
align-items:center;
justify-content:center;
z-index:999;
">

  <div style="
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  text-align:center;
  width:80%;
  max-width:300px;
  ">

    <h3>Seguir nas redes</h3>

    <a href="https://instagram.com/andre.de.dede" target="_blank" class="social" style="display:block; margin:10px 0;">
      Instagram
    </a>

    <a href="https://facebook.com/" target="_blank" class="social" style="display:block; margin:10px 0;">
      Facebook
    </a>

    <div onclick="fecharRedes()" style="margin-top:15px; cursor:pointer; color:#94a3b8;">
      Fechar
    </div>

  </div>

</div>
</body>
</html>
