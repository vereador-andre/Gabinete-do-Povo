<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gabinete do Povo</title>

<!-- Fonte moderna -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0f172a;
  color:white;
}

/* TELA INICIAL */
#inicio {
  height:100vh;
  background:linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), url('fundo.jpg');
  background-size:cover;
  background-position:top center;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}
  
#inicio h1 {
  font-size:28px;
  font-weight:600;
  margin-bottom:10px;
}

#inicio p {
  font-size:16px;
  opacity:0.8;
}

.botao-entrar {
  margin-top:20px;
  background:#16a34a;
  padding:15px 25px;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 4px 15px rgba(0,0,0,0.5);
}

/* MENU */
#menu {
  display:none;
  padding:20px;
  min-height:100vh;
  background:linear-gradient(rgba(15,23,42,0.95), rgba(15,23,42,0.98)), url('logo.png');
  background-repeat:no-repeat;
  background-position:center 150px;
  background-size:200px;
}
/* HEADER */
.header {
  <div class="header">
  <h2 style="font-size:22px;">Gabinete do Povo</h2>
  <p style="font-size:14px; margin-top:5px;">Vereador André de Dedé</p>
  <p style="margin-top:10px; font-size:13px; color:#cbd5f5;">
    Sua voz agora tem vez
  </p>
</div>
}

.header h2 {
  margin:0;
  font-weight:600;
}

.header p {
  margin:0;
  color:#94a3b8;
  font-size:14px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* CARDS MODERNOS */
.card {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:20px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.1);
}

.card:hover {
  transform:scale(1.05);
  background:#16a34a;
}

.icon {
  font-size:28px;
  margin-bottom:10px;
}

.texto {
  font-size:14px;
  font-weight:500;
}
</style>
</head>

<body>

<!-- TELA INICIAL -->
<div id="inicio">
  <h1>Gabinete do Povo</h1>
  <p>Transparência, participação e trabalho</p>

  <div class="botao-entrar" onclick="entrar()">
    ENTRAR AGORA
  </div>
</div>

<!-- MENU -->
<div id="menu">

  <div class="header">
    <h2>Olá 👋</h2>
    <p>Escolha uma opção</p>
  </div>

  <div class="grid">

    <div class="card" onclick="ir('acoes.html')">
      <div class="icon">📊</div>
      <div class="texto">Ações</div>
    </div>

    <div class="card">
      <div class="icon">📌</div>
      <div class="texto">Indicações</div>
    </div>

    <div class="card">
      <div class="icon">📄</div>
      <div class="texto">Requerimentos</div>
    </div>

    <div class="card">
      <div class="icon">⚖️</div>
      <div class="texto">Projetos</div>
    </div>

    <div class="card">
      <div class="icon">📰</div>
      <div class="texto">Notícias</div>
    </div>

    <div class="card">
      <div class="icon">🎤</div>
      <div class="texto">Sessões</div>
    </div>

    <div class="card">
      <div class="icon">📞</div>
      <div class="texto">Fale Conosco</div>
    </div>

  </div>

</div>

<script>
function entrar(){
  document.getElementById("inicio").style.display = "none";
  document.getElementById("menu").style.display = "block";
}

function ir(pagina){
  window.location.href = pagina;
}
</script>

</body>
</html>
