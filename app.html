<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gabinete do Povo - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;    /* Azul Forte */
            --accent: #22c55e;     /* Verde Ação */
            --text-dark: #1e293b;
            --text-light: #64748b;
            --bg: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            padding-bottom: 30px;
        }

        /* Header e Perfil */
        .perfil-section {
            background: white;
            padding: 40px 20px 30px;
            text-align: center;
            border-radius: 0 0 40px 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 15px;
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 0 0 3px var(--accent); /* Aro verde ao redor */
        }

        .nome-vereador {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin: 5px 0 0;
            letter-spacing: -0.5px;
        }

        .cargo-tag {
            display: inline-block;
            background: var(--primary);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
        }

        .frase-mandato {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-light);
            max-width: 250px;
            margin: 0 auto;
            line-height: 1.4;
        }

        /* Grid de Botões */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 20px;
        }

        .menu-item {
            background: white;
            padding: 20px 15px;
            border-radius: 22px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .menu-item:active {
            transform: scale(0.95);
            background: #f1f5f9;
        }

        .menu-item i {
            font-size: 32px;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .menu-item span {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            text-align: center;
        }

        /* Botão Destaque (Contato) */
        .btn-full {
            grid-column: span 2;
            background: var(--accent);
            flex-direction: row;
            gap: 10px;
            color: white;
        }

        .btn-full i, .btn-full span {
            color: white !important;
        }

        /* Rodapé Redes Sociais */
        .social-footer {
            margin-top: 30px;
            text-align: center;
            padding: 20px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icons a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="perfil-section">
        <div class="avatar-container">
            <img src="fundofoto.jpg" alt="André de Dedé" class="avatar-image">
        </div>
        
        <span class="cargo-tag">Vereador</span>
        <h1 class="nome-vereador">André de Dedé</h1>
        <p class="frase-mandato">Conecte-se com o nosso mandato e participe da mudança.</p>
    </div>

    <div class="menu-grid">
        <a href="noticias.html" class="menu-item">
            <i class="material-icons">newspaper</i>
            <span>Notícias</span>
        </a>
        <a href="acoes.html" class="menu-item">
            <i class="material-icons">task_alt</i>
            <span>Ações</span>
        </a>
        <a href="indicacoes.html" class="menu-item">
            <i class="material-icons">assignment</i>
            <span>Indicações</span>
        </a>
        <a href="requerimentos.html" class="menu-item">
            <i class="material-icons">description</i>
            <span>Requerimentos</span>
        </a>
        <a href="projetos.html" class="menu-item">
            <i class="material-icons">gavel</i>
            <span>Projetos de Lei</span>
        </a>
        <a href="sessoes.html" class="menu-item">
            <i class="material-icons">videocam</i>
            <span>Sessões</span>
        </a>
        
        <a href="contato.html" class="menu-item btn-full">
            <i class="material-icons">chat</i>
            <span>Falar com o Gabinete</span>
        </a>
    </div>

    <div class="social-footer">
        <p style="font-size: 11px; color: var(--text-light); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;">Acompanhe nossas redes</p>
        <div class="social-icons">
            <a href="https://instagram.com/andre.de.dede"><i class="material-icons">camera_alt</i></a>
            <a href="https://facebook.com/andrekelly.santos"><i class="material-icons">facebook</i></a>
        </div>
    </div>

</body>
</html>
