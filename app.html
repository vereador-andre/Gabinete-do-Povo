<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete do Povo - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 40px; }
        
        /* Topo com a Foto e Textos */
        .topo-perfil { 
            background: #1e3a8a; 
            padding: 40px 20px; 
            text-align: center; 
            border-radius: 0 0 40px 40px;
            color: white;
        }
        .foto-perfil {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .topo-perfil h2 { margin: 0; font-size: 24px; font-weight: 600; }
        .topo-perfil .cargo { margin: 0; font-size: 16px; font-weight: 300; opacity: 0.9; }
        .topo-perfil .frase-efeito { 
            margin-top: 10px; font-size: 13px; font-weight: 400;
            display: flex; align-items: center; justify-content: center;
            gap: 5px; color: #22c55e;
        }

        /* Grade de Ícones */
        .grid-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px 20px 10px; /* Reduzi o padding inferior aqui */
        }
        .menu-item {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #1e3a8a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .menu-item:active { transform: scale(0.95); }
        .menu-item i { font-size: 38px; margin-bottom: 10px; color: #1e3a8a; }
        .menu-item span { font-size: 13px; font-weight: 600; text-align: center; }

        /* Botão de Destaque: Fale Conosco */
        .btn-contato-destaque {
            margin: 5px 20px 20px;
            padding: 18px;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2);
            transition: 0.3s;
        }
        .btn-contato-destaque:active { transform: scale(0.97); }

        /* Rodapé Administrativo */
        .btn-admin-acesso {
            margin: 10px 20px 10px;
            padding: 12px;
            background: #e2e8f0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #475569;
            text-decoration: none;
            font-size: 12px;
        }

        /* Sair do Aplicativo */
        .btn-sair-app {
            margin: 0 20px;
            padding: 15px;
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #ef4444;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>

    <div class="topo-perfil">
        <img src="fundofoto.jpg" alt="Vereador André de Dedé" class="foto-perfil">
        <h2>André de Dedé</h2>
        <p class="cargo">Vereador</p>
        <div class="frase-efeito">
            <i class="material-icons" style="font-size: 16px;">bolt</i>
            Gabinete do Povo em Ação
        </div>
    </div>

    <div class="grid-menu">
        <a href="noticias.html" class="menu-item">
            <i class="material-icons">newspaper</i>
            <span>Notícias</span>
        </a>

        <a href="acoes.html" class="menu-item">
            <i class="material-icons">task_alt</i>
            <span>Ações Atendidas</span>
        </a>

        <a href="indicacoes.html" class="menu-item">
            <i class="material-icons">assignment</i>
            <span>Indicações</span>
        </a>

        <a href="requerimentos.html" class="menu-item">
            <i class="material-icons">description</i>
            <span>Requerimentos</span>
        </a>

        <a href="projetos.html" class="menu-item">
            <i class="material-icons">gavel</i>
            <span>Projetos de Lei</span>
        </a>

        <a href="sessoes.html" class="menu-item">
            <i class="material-icons">videocam</i>
            <span>Sessões</span>
        </a>
    </div>

    <a href="contato.html" class="btn-contato-destaque">
        <i class="material-icons">chat</i>
        Fale com o Vereador
    </a>

    <a href="login.html" class="btn-admin-acesso">
        <i class="material-icons">lock</i>
        Acesso Administrativo
    </a>

    <a href="index.html" class="btn-sair-app">
        <i class="material-icons">power_settings_new</i>
        Sair do Aplicativo
    </a>

</body>
</html>
