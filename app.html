<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete do Povo - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; color:#1e293b; padding-bottom: 30px; }
        
        /* Cabeçalho */
        .topo-app { background:#1e3a8a; color:white; padding:40px 20px 60px; border-radius:0 0 30px 30px; text-align:center; }
        .topo-app h2 { margin:0; font-size:20px; font-weight:600; }
        .topo-app p { margin:5px 0 0; font-size:14px; opacity:0.8; }

        /* Grid de Opções */
        .grid-menu { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 20px; 
            margin-top: -30px; /* Sobe o menu para cima do azul */
        }

        .menu-item { 
            background: white; 
            padding: 25px 15px; 
            border-radius: 20px; 
            text-align: center; 
            text-decoration: none; 
            color: #1e3a8a;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .menu-item:active { transform: scale(0.95); }

        .menu-item i { 
            font-size: 35px; 
            background: #f1f5f9; 
            padding: 15px; 
            border-radius: 50%; 
            color: #1e3a8a;
        }

        .menu-item span { font-size: 13px; font-weight: 600; }

        /* Rodapé de Volta */
        .btn-sair {
            margin: 20px;
            padding: 15px;
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #ef4444;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="topo-app">
        <h2>Olá, Cidadão!</h2>
        <p>Acompanhe aqui o nosso trabalho por você.</p>
    </div>

    <div class="grid-menu">
        <a href="noticias.html" class="menu-item">
            <i class="material-icons">newspaper</i>
            <span>Notícias</span>
        </a>

        <a href="acoes.html" class="menu-item">
            <i class="material-icons">task_alt</i>
            <span>Ações Atendidas</span>
        </a>

        <a href="sessoes.html" class="menu-item">
            <i class="material-icons">videocam</i>
            <span>Sessões</span>
        </a>

        <a href="indicacoes.html" class="menu-item">
            <i class="material-icons">assignment</i>
            <span>Indicações</span>
        </a>

        <a href="requerimentos.html" class="menu-item">
            <i class="material-icons">description</i>
            <span>Requerimentos</span>
        </a>

        <a href="projetos.html" class="menu-item">
            <i class="material-icons">gavel</i>
            <span>Projetos de Lei</span>
        </a>
    </div>

    <a href="index.html" class="btn-sair">
        <i class="material-icons">logout</i>
        Sair do Aplicativo
    </a>

</body>
</html>
