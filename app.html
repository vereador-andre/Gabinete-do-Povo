<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete do Povo - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 30px; }
        
        /* Topo com a Foto Circular */
        .topo-perfil { 
            background: #1e3a8a; 
            padding: 40px 20px; 
            text-align: center; 
            border-radius: 0 0 40px 40px;
            color: white;
        }
        .foto-perfil {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .topo-perfil h2 { margin: 5px 0; font-size: 20px; }
        .topo-perfil p { margin: 0; font-size: 14px; opacity: 0.8; }

        /* Grade de Ícones */
        .grid-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 25px;
        }
        .menu-item {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #1e3a8a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .menu-item:active { transform: scale(0.95); }
        .menu-item i { font-size: 40px; margin-bottom: 10px; color: #1e3a8a; }
        .menu-item span { font-size: 14px; font-weight: 600; text-align: center; }

        /* Botão Admin lá embaixo */
        .btn-admin-acesso {
            margin: 20px;
            padding: 15px;
            background: #e2e8f0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #475569;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="topo-perfil">
        <img src="foto.jpg" alt="Vereador André de Dedé" class="foto-perfil">
        <h2>André de Dedé</h2>
        <p>Vereador</p>
    </div>

    <div class="grid-menu">
        <a href="noticias.html" class="menu-item">
            <i class="material-icons">newspaper</i>
            <span>Notícias</span>
        </a>

        <a href="acoes.html" class="menu-item">
            <i class="material-icons">task_alt</i>
            <span>Ações Atendidas</span>
        </a>

        <a href="indicacoes.html" class="menu-item">
            <i class="material-icons">assignment</i>
            <span>Indicações</span>
        </a>

        <a href="requerimentos.html" class="menu-item">
            <i class="material-icons">description</i>
            <span>Requerimentos</span>
        </a>

        <a href="projetos.html" class="menu-item">
            <i class="material-icons">gavel</i>
            <span>Projetos de Lei</span>
        </a>

        <a href="sessoes.html" class="menu-item">
            <i class="material-icons">videocam</i>
            <span>Sessões</span>
        </a>
    </div>

    <a href="login.html" class="btn-admin-acesso">
        <i class="material-icons" style="font-size: 18px;">lock</i>
        Acesso Administrativo
    </a>

    <div style="text-align: center; margin-top: 10px;">
        <a href="index.html" style="color: #94a3b8; text-decoration: none; font-size: 12px;">Voltar para Início</a>
    </div>

</body>
</html>
