<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notícias</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0f172a;
  color:white;
}

/* TOPO */
.topo {
  display:flex;
  align-items:center;
  gap:10px;
  padding:20px;
}

.voltar {
  background:#1e293b;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
}

/* FEED */
.feed {
  padding:0 15px 30px;
}

.post {
  background:#1e293b;
  border-radius:20px;
  margin-bottom:20px;
  overflow:hidden;
}

/* IMAGEM */
.post img {
  width:100%;
  height:200px;
  object-fit:cover;
}

/* CONTEÚDO */
.post-content {
  padding:15px;
}

.post-title {
  font-weight:600;
  margin-bottom:5px;
}

.post-date {
  font-size:12px;
  color:#94a3b8;
  margin-bottom:10px;
}

.post-text {
  font-size:14px;
}

/* LOGO */
.logo {
  text-align:center;
  margin-top:20px;
}

.logo img {
  width:90px;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="voltar" onclick="voltar()">←</div>
  <div><b>Notícias</b></div>
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>

</div>

<!-- LOGO -->
<div class="logo">
  <img src="logo.png">
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc",
  authDomain: "gabinete-do-povo.firebaseapp.com",
  projectId: "gabinete-do-povo",
  storageBucket: "gabinete-do-povo.firebasestorage.app",
  messagingSenderId: "450444313568",
  appId: "1:450444313568:web:e12ba742d940dc23e52185"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function carregarNoticias(){

  const feed = document.getElementById("feed");

  db.collection("noticias")
  .orderBy("criadoEm", "desc")
  .get()
  .then(snapshot => {

    snapshot.forEach(doc => {

      let noticia = doc.data();

      let midia = "";

      // 🎥 Se for vídeo do YouTube
      if(noticia.imagem && noticia.imagem.includes("youtube")){
        
        let videoId = noticia.imagem.split("v=")[1];

        midia = `
          <iframe width="100%" height="200"
          src="https://www.youtube.com/embed/${videoId}"
          frameborder="0" allowfullscreen></iframe>
        `;

      } 
      // 📷 Se for imagem
      else if(noticia.imagem){

        midia = `<img src="${noticia.imagem}">`;

      } 
      // ❌ Sem mídia
      else {
        midia = `<img src="https://via.placeholder.com/400x200">`;
      }

      const post = `
        <div class="post">
          ${midia}
          <div class="post-content">
            <div class="post-title">${noticia.titulo}</div>
            <div class="post-date">${noticia.data}</div>
            <div class="post-text">${noticia.texto}</div>

            <button onclick="compartilhar('${noticia.titulo}')" style="
              margin-top:10px;
              background:#22c55e;
              border:none;
              padding:10px;
              border-radius:10px;
              color:white;
              width:100%;
            ">
              Compartilhar
            </button>
          </div>
        </div>
      `;

      feed.innerHTML += post;

    });

  });

}

function voltar(){
  window.history.back();
}

function compartilhar(titulo){
  let texto = `Veja essa ação do Gabinete do Povo: ${titulo}`;
  let url = `https://wa.me/?text=${encodeURIComponent(texto)}`;
  window.open(url, "_blank");
}

carregarNoticias();

</script>
</body>
</html>
