<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notícias</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0f172a;
  color:white;
}

/* TOPO */
.topo {
  display:flex;
  align-items:center;
  gap:10px;
  padding:20px;
}

.voltar {
  background:#1e293b;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
}

/* FEED */
.feed {
  padding:0 15px 30px;
}

.post {
  background:#1e293b;
  border-radius:20px;
  margin-bottom:20px;
  overflow:hidden;
}

/* IMAGEM */
.post img {
  width:100%;
  height:200px;
  object-fit:cover;
}

/* CONTEÚDO */
.post-content {
  padding:15px;
}

.post-title {
  font-weight:600;
  margin-bottom:5px;
}

.post-date {
  font-size:12px;
  color:#94a3b8;
  margin-bottom:10px;
}

.post-text {
  font-size:14px;
}

/* LOGO */
.logo {
  text-align:center;
  margin-top:20px;
}

.logo img {
  width:90px;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="voltar" onclick="voltar()">←</div>
  <div><b>Notícias</b></div>
</div>

<!-- FEED -->
<div class="feed" id="feed"></div>

</div>

<!-- LOGO -->
<div class="logo">
  <img src="logo.png">
</div>

<script>
async function carregarNoticias(){
  const response = await fetch("noticias.json");
  const noticias = await response.json();

  const feed = document.getElementById("feed");

  noticias.reverse().forEach(noticia => {
    const post = `
      <div class="post">
        <img src="${noticia.imagem}">
        <div class="post-content">
          <div class="post-title">${noticia.titulo}</div>
          <div class="post-date">${noticia.data}</div>
          <div class="post-text">${noticia.texto}</div>
        </div>
      </div>
    `;
    feed.innerHTML += post;
  });
}

carregarNoticias();

function voltar(){
  window.history.back();
}
</script>
</body>
</html>
