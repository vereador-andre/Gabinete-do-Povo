<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícias - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 30px; }
        .topo { background:#1e3a8a; color:white; padding:20px; display:flex; align-items:center; gap:15px; position:sticky; top:0; z-index:100; border-radius:0 0 20px 20px; }
        .container { padding: 15px; }
        .card { background:white; border-radius:20px; overflow:hidden; margin-bottom:20px; box-shadow:0 4px 15px rgba(0,0,0,0.05); }
        .card img { width:100%; border:none; display:block; object-fit: cover; max-height: 250px; }
        .card-body { padding:15px; }
        .card-data { font-size:11px; color:#94a3b8; font-weight:600; text-transform:uppercase; }
        .card-titulo { font-size:16px; color:#1e3a8a; font-weight:600; margin:5px 0; }
        .card-texto { font-size:13px; color:#475569; line-height:1.5; }
        .btn-compartilhar { display:flex; align-items:center; justify-content:center; gap:8px; background:#f8fafc; color:#1e3a8a; border:1px solid #e2e8f0; padding:10px; border-radius:12px; margin-top:15px; cursor:pointer; font-weight:600; font-size:13px; }
    </style>
</head>
<body>
<div class="topo"><i class="material-icons" onclick="history.back()">arrow_back</i><span>Notícias</span></div>
<div class="container" id="lista-publica">Carregando...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    db.collection("noticias").orderBy("data", "desc").onSnapshot(snapshot => {
        const lista = document.getElementById("lista-publica");
        lista.innerHTML = "";
        snapshot.forEach(doc => {
            const item = doc.data();
            lista.innerHTML += `
                <div class="card">
                    <img src="${item.imagem || item.link || 'fundo.jpg'}">
                    <div class="card-body">
                        <div class="card-data">${item.data}</div>
                        <div class="card-titulo">${item.titulo}</div>
                        <div class="card-texto">${item.descricao || item.texto || ''}</div>
                        <div class="btn-compartilhar" onclick="compartilhar('${item.titulo}', '${item.descricao || item.texto || ''}')">
                            <i class="material-icons" style="font-size:18px">share</i> Compartilhar
                        </div>
                    </div>
                </div>`;
        });
    });

    function compartilhar(titulo, texto) {
        if (navigator.share) { navigator.share({ title: titulo, text: texto, url: window.location.href }); }
    }
</script>
</body>
</html>
