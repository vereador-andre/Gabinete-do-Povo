<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Interna - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 50px; display:none; }
        .topo { background:#0f172a; color:white; padding:20px; display:flex; align-items:center; gap:15px; }
        .tabs { display: flex; overflow-x: auto; background: white; padding: 10px; gap: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #e2e8f0; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 8px 18px; border-radius: 20px; border: none; background: #f1f5f9; color: #64748b; font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .tab-btn.active { background: #1e3a8a; color: white; }
        .container { padding: 15px; }
        .secao { display: none; }
        .secao.active { display: block; }
        .card-gestao { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; border-left: 5px solid #1e3a8a; }
        .form-controle { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-top: 8px; box-sizing: border-box; font-family: 'Poppins'; font-size: 14px; outline: none; }
        .btn-salvar { background: #1e3a8a; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; margin-top: 15px; font-weight: 600; cursor: pointer; }
        .placar-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .placar-item { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .placar-item small { font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: 600; }
        .placar-item div { font-size: 20px; font-weight: 600; color: #1e3a8a; }
        .badge { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .badge-urbana { background: #dcfce7; color: #166534; }
        .badge-rural { background: #fef3c7; color: #92400e; }
        .btn-acao { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; color: #cbd5e1; }
        .btn-acao i { cursor: pointer; font-size: 20px; }
        .valor-txt { color: #ef4444; font-weight: 600; }
    </style>
</head>
<body>

<div class="topo">
    <i class="material-icons" onclick="location.href='admin.html'" style="cursor:pointer">arrow_back</i>
    <span style="font-weight:600">Gestão de Lideranças</span>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab(event, 'liderancas')"><i class="material-icons" style="font-size:16px">groups</i> Lideranças</button>
</div>

<div class="container">
    <div id="liderancas" class="secao active">
        <div class="placar-container">
            <div class="placar-item"><small>Zona Urbana</small><div id="countUrbana">0</div></div>
            <div class="placar-item"><small>Zona Rural</small><div id="countRural">0</div></div>
        </div>

        <div class="card-gestao" id="formLideranca">
            <h4 style="margin:0" id="tituloForm">Nova Liderança</h4>
            <input type="hidden" id="idLid">
            <input type="text" id="nomeLid" class="form-controle" placeholder="Nome do Líder">
            <input type="text" id="bairroLid" class="form-controle" placeholder="Bairro ou Comunidade">
            <select id="zonaLid" class="form-controle">
                <option value="Urbana">🏙️ Zona Urbana</option>
                <option value="Rural">🚜 Zona Rural</option>
            </select>
            <input type="text" id="contatoLid" class="form-controle" placeholder="Contato (WhatsApp)">
            <input type="number" id="valorLid" class="form-controle" placeholder="Valor gasto R$">
            <button class="btn-salvar" id="btnSalvarLid" onclick="salvarLid()">Cadastrar Liderança</button>
            <button class="btn-salvar" id="btnCancelarEdit" onclick="cancelarEdicao()" style="display:none; background:#64748b; margin-top:5px;">Cancelar Alteração</button>
        </div>

        <div id="listaLid"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    db.enablePersistence().catch(() => {});

    window.onload = async () => {
        try {
            const doc = await db.collection("configuracoes").doc("acesso").get();
            // Tenta pegar a senhaGestao, se não existir usa a senha padrão 1234
            const senhaGestao = doc.exists && doc.data().senhaGestao ? doc.data().senhaGestao : "1234";
            
            const confirmacao = prompt("Senha de Acesso - GESTÃO INTERNA:");
            
            if(confirmacao === senhaGestao) {
                document.body.style.display = "block";
                ouvirLiderancas();
            } else {
                alert("Senha de Gestão Incorreta!");
                window.location.href = "admin.html";
            }
        } catch (e) { alert("Erro de conexão."); }
    };

    function switchTab(evt, tabName) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    // SALVAR OU ATUALIZAR
    function salvarLid() {
        const id = document.getElementById('idLid').value;
        const dados = {
            nome: document.getElementById('nomeLid').value,
            bairro: document.getElementById('bairroLid').value,
            zona: document.getElementById('zonaLid').value,
            contato: document.getElementById('contatoLid').value,
            valorGasto: parseFloat(document.getElementById('valorLid').value) || 0,
            atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!dados.nome) return alert("Preencha o nome.");

        if(id) {
            db.collection("liderancas").doc(id).update(dados)
                .then(() => { alert("Liderança atualizada!"); cancelarEdicao(); });
        } else {
            dados.criadoEm = firebase.firestore.FieldValue.serverTimestamp();
            db.collection("liderancas").add(dados)
                .then(() => { alert("Liderança cadastrada!"); limparCampos(); });
        }
    }

    // ESCUTAR BANCO (CORREÇÃO DO CONTADOR)
    function ouvirLiderancas() {
        db.collection("liderancas").orderBy("nome", "asc").onSnapshot(snap => {
            const lista = document.getElementById("listaLid");
            let urb = 0, rur = 0;
            lista.innerHTML = "";

            snap.forEach(doc => {
                const d = doc.data();
                // Contagem exata
                if(d.zona === "Urbana") urb++; 
                if(d.zona === "Rural") rur++;

                lista.innerHTML += `
                <div class="card-gestao" style="border-left-color: ${d.zona === 'Urbana' ? '#1e3a8a' : '#f59e0b'}">
                    <div class="btn-acao">
                        <i class="material-icons" style="color:#64748b" onclick="prepararEdicao('${doc.id}', ${JSON.stringify(d).replace(/"/g, '&quot;')})">edit</i>
                        <i class="material-icons" style="color:#cbd5e1" onclick="excluirLid('${doc.id}')">delete</i>
                    </div>
                    <strong>${d.nome}</strong> <span class="badge ${d.zona === 'Urbana' ? 'badge-urbana' : 'badge-rural'}">${d.zona}</span>
                    <div style="font-size:12px; color:#64748b; margin-top:5px;">
                        📍 ${d.bairro} | 📱 ${d.contato} <br>
                        Investimento: <span class="valor-txt">R$ ${d.valorGasto.toFixed(2)}</span>
                    </div>
                </div>`;
            });
            document.getElementById("countUrbana").innerText = urb;
            document.getElementById("countRural").innerText = rur;
        });
    }

    // EDITAR TUDO
    window.prepararEdicao = function(id, data) {
        document.getElementById('idLid').value = id;
        document.getElementById('nomeLid').value = data.nome;
        document.getElementById('bairroLid').value = data.bairro;
        document.getElementById('zonaLid').value = data.zona;
        document.getElementById('contatoLid').value = data.contato;
        document.getElementById('valorLid').value = data.valorGasto;
        
        document.getElementById('tituloForm').innerText = "Alterar Liderança";
        document.getElementById('btnSalvarLid').innerText = "Salvar Alterações";
        document.getElementById('btnCancelarEdit').style.display = "block";
        window.scrollTo(0,0);
    };

    function cancelarEdicao() {
        limparCampos();
        document.getElementById('tituloForm').innerText = "Nova Liderança";
        document.getElementById('btnSalvarLid').innerText = "Cadastrar Liderança";
        document.getElementById('btnCancelarEdit').style.display = "none";
    }

    function excluirLid(id) {
        if(confirm("Excluir esta liderança?")) db.collection("liderancas").doc(id).delete();
    }

    function limparCampos() {
        document.getElementById('idLid').value = "";
        document.getElementById('nomeLid').value = "";
        document.getElementById('bairroLid').value = "";
        document.getElementById('contatoLid').value = "";
        document.getElementById('valorLid').value = "";
    }
</script>
</body>
</html>
