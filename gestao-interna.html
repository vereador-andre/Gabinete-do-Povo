<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Interna - Vereador</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; display:none; } /* Escondido até validar senha */
        .topo { background:#0f172a; color:white; padding:20px; display:flex; align-items:center; gap:15px; }
        .resumo-liderancas { display: flex; gap: 10px; padding: 15px; }
        .card-mini { flex:1; background: white; padding: 10px; border-radius: 12px; text-align:center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-mini span { display:block; font-size: 18px; font-weight: 600; color: #1e3a8a; }
        .card-mini small { font-size: 10px; color: #64748b; text-transform: uppercase; }
        
        .container { padding: 15px; }
        .card-gestao { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .form-controle { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-top: 8px; box-sizing: border-box; font-family: 'Poppins'; font-size: 14px; outline: none; }
        .btn-salvar { background: #1e3a8a; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; margin-top: 15px; font-weight: 600; cursor: pointer; }
        
        .badge-zona { padding: 2px 8px; border-radius: 5px; font-size: 10px; font-weight: 700; margin-left: 5px; }
        .urbana { background: #e0f2fe; color: #0369a1; }
        .rural { background: #fef3c7; color: #92400e; }
        .gasto-lid { color: #ef4444; font-weight: 600; font-size: 13px; margin-top: 5px; display: block; }
        .btn-acoes { display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid #f1f5f9; padding-top: 10px; }
        .btn-acao { border:none; background:none; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:4px; font-weight:600; }
    </style>
</head>
<body>

<div class="topo">
    <i class="material-icons" onclick="location.href='admin.html'" style="cursor:pointer">arrow_back</i>
    <span style="font-weight:600">Gestão de Lideranças</span>
</div>

<div class="resumo-liderancas">
    <div class="card-mini"><span id="qtdUrbana">0</span><small>Zona Urbana</small></div>
    <div class="card-mini"><span id="qtdRural">0</span><small>Zona Rural</small></div>
</div>

<div class="container">
    <div class="card-gestao">
        <h4 style="margin:0" id="tituloForm">Nova Liderança</h4>
        <input type="hidden" id="idLid"> <input type="text" id="nomeLid" class="form-controle" placeholder="Nome da Liderança">
        <select id="zonaLid" class="form-controle">
            <option value="Urbana">Zona Urbana</option>
            <option value="Rural">Zona Rural</option>
        </select>
        <input type="text" id="bairroLid" class="form-controle" placeholder="Bairro ou Comunidade">
        <input type="text" id="zapLid" class="form-controle" placeholder="WhatsApp">
        <button class="btn-salvar" id="btnSalvarLid" onclick="salvarLid()">Cadastrar Liderança</button>
    </div>

    <div id="listaLid"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    // 1. SEGURANÇA: Chave de acesso extra
    const chave = prompt("Digite a Chave de Acesso para Gestão Interna:");
    if(chave === "1234") { // Mude "1234" para sua chave secreta
        document.body.style.display = "block";
    } else {
        alert("Chave incorreta!");
        window.location.href = "admin.html";
    }

    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // 2. CONFIGURAÇÃO OFFLINE
    db.settings({ cacheSizeBytes: firebase.firestore.CACHE_SIZE_UNLIMITED });
    db.enablePersistence().catch(err => console.error("Erro offline:", err.code));

    // --- FUNÇÕES ---

    function salvarLid() {
        const id = document.getElementById('idLid').value;
        const dados = {
            nome: document.getElementById('nomeLid').value,
            zona: document.getElementById('zonaLid').value,
            bairro: document.getElementById('bairroLid').value,
            whatsapp: document.getElementById('zapLid').value,
            atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!id) {
            // Novo cadastro
            dados.criadoEm = firebase.firestore.FieldValue.serverTimestamp();
            db.collection("liderancas").add(dados);
        } else {
            // Editar existente
            db.collection("liderancas").doc(id).update(dados);
            document.getElementById('idLid').value = "";
            document.getElementById('btnSalvarLid').innerText = "Cadastrar Liderança";
        }
        limparCampos();
    }

    function limparCampos() {
        document.getElementById('nomeLid').value = "";
        document.getElementById('bairroLid').value = "";
        document.getElementById('zapLid').value = "";
    }

    db.collection("liderancas").orderBy("nome", "asc").onSnapshot(snap => {
        const list = document.getElementById("listaLid");
        list.innerHTML = "";
        let urbana = 0, rural = 0;

        snap.forEach(doc => {
            const d = doc.data();
            if(d.zona === "Urbana") urbana++; else rural++;

            list.innerHTML += `
                <div class="card-gestao">
                    <strong>${d.nome}</strong> 
                    <span class="badge-zona ${d.zona.toLowerCase()}">${d.zona}</span>
                    <p style="margin:5px 0; font-size:12px; color:#64748b;">${d.bairro} | Zap: ${d.whatsapp}</p>
                    <span class="gasto-lid">Gasto Acumulado: R$ 0,00</span>
                    
                    <div class="btn-acoes">
                        <button class="btn-acao" style="color:#3b82f6" onclick="prepararEdicao('${doc.id}', '${d.nome}', '${d.zona}', '${d.bairro}', '${d.whatsapp}')">
                            <i class="material-icons" style="font-size:16px">edit</i> Alterar
                        </button>
                        <button class="btn-acao" style="color:#ef4444" onclick="excluir('${doc.id}')">
                            <i class="material-icons" style="font-size:16px">delete</i> Excluir
                        </button>
                    </div>
                </div>`;
        });
        document.getElementById("qtdUrbana").innerText = urbana;
        document.getElementById("qtdRural").innerText = rural;
    });

    function prepararEdicao(id, nome, zona, bairro, zap) {
        document.getElementById('idLid').value = id;
        document.getElementById('nomeLid').value = nome;
        document.getElementById('zonaLid').value = zona;
        document.getElementById('bairroLid').value = bairro;
        document.getElementById('zapLid').value = zap;
        document.getElementById('btnSalvarLid').innerText = "Salvar Alterações";
        window.scrollTo(0,0);
    }

    function excluir(id) {
        if(confirm("Deseja excluir esta liderança?")) db.collection("liderancas").doc(id).delete();
    }
</script>
</body>
</html>
