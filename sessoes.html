<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessões - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; }
        .topo { background:#1e3a8a; color:white; padding:20px; text-align:center; border-radius:0 0 25px 25px; }
        
        /* Abas para filtrar */
        .abas { display: flex; gap: 10px; padding: 20px; justify-content: center; }
        .aba-btn { 
            padding: 10px 20px; border-radius: 20px; border: none; background: white; 
            color: #1e3a8a; font-weight: 600; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .aba-btn.ativa { background: #1e3a8a; color: white; }

        .lista-videos { padding: 0 20px 20px; }
        .video-card { background: white; border-radius: 15px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border:none; }
        .info { padding: 15px; }
        .info h3 { margin: 0; font-size: 16px; color: #1e3a8a; }
        .info p { margin: 5px 0 0; font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

<div class="topo">
    <h2 style="margin:0">Sessões da Câmara</h2>
</div>

<div class="abas">
    <button class="aba-btn ativa" onclick="carregarSessoes('ordinaria', this)">Ordinárias</button>
    <button class="aba-btn" onclick="carregarSessoes('extraordinaria', this)">Extraordinárias</button>
</div>

<div class="lista-videos" id="containerSessoes">
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function carregarSessoes(tipo, btn) {
        // Estilo dos botões
        document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('ativa'));
        btn.classList.add('ativa');

        const container = document.getElementById("containerSessoes");
        container.innerHTML = "<p style='text-align:center'>Carregando sessões...</p>";

        db.collection("sessoes")
          .where("tipo", "==", tipo)
          .orderBy("criadoEm", "desc")
          .get()
          .then(snapshot => {
            container.innerHTML = "";
            if(snapshot.empty) {
                container.innerHTML = "<p style='text-align:center; color:#64748b;'>Nenhuma sessão encontrada.</p>";
                return;
            }
            snapshot.forEach(doc => {
                let s = doc.data();
                // Converte link do Youtube para formato embed
                let videoID = s.link.split('v=')[1] || s.link.split('/').pop();
                let embedLink = `https://www.youtube.com/embed/${videoID}`;

                container.innerHTML += `
                    <div class="video-card">
                        <div class="video-container">
                            <iframe src="${embedLink}" allowfullscreen></iframe>
                        </div>
                        <div class="info">
                            <h3>${s.titulo}</h3>
                            <p>${s.data}</p>
                        </div>
                    </div>
                `;
            });
        });
    }

    // Inicia carregando as Ordinárias
    carregarSessoes('ordinaria', document.querySelector('.aba-btn.ativa'));
</script>

</body>
</html>
