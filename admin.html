<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

input, textarea{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  border:none;
}

button{
  margin-top:15px;
  padding:10px;
  width:100%;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:10px;
}

#painel{display:none;}
</style>
</head>

<body>

<h2>Área Administrativa</h2>

<div id="login">
  <input type="password" id="senha" placeholder="Digite a senha">
  <button onclick="entrar()">Entrar</button>
</div>

<div id="painel">

  <input id="titulo" placeholder="Título">
  <input id="data" placeholder="Data">
  <input id="imagem" placeholder="Link da imagem (ou imagens/arquivo.jpg)">
  <textarea id="texto" placeholder="Texto"></textarea>

  <button onclick="gerar()">Gerar notícia</button>

  <textarea id="resultado" placeholder="Aqui vai aparecer o código"></textarea>

</div>

<script>
function entrar(){
  let senha = document.getElementById("senha").value;

  if(senha === "123456"){
    document.getElementById("login").style.display = "none";
    document.getElementById("painel").style.display = "block";
  } else {
    alert("Senha incorreta");
  }
}

function gerar(){
  let titulo = document.getElementById("titulo").value;
  let data = document.getElementById("data").value;
  let imagem = document.getElementById("imagem").value;
  let texto = document.getElementById("texto").value;

  let json = `{
  "titulo": "${titulo}",
  "data": "${data}",
  "texto": "${texto}",
  "imagem": "${imagem}"
},`;

  document.getElementById("resultado").value = json;
}
</script>

</body>
</html>
