<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 30px; }
        .topo-admin { background: #0f172a; color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; }
        .grid-admin { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card-admin { 
            background: white; padding: 20px; border-radius: 20px; display: flex; 
            flex-direction: column; align-items: center; text-decoration: none; color: #1e3a8a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center;
        }
        .card-admin i { font-size: 35px; margin-bottom: 10px; color: #3b82f6; }
        .card-admin span { font-size: 13px; font-weight: 600; }
        .btn-sair { margin: 20px; padding: 15px; background: #fee2e2; color: #ef4444; border-radius: 15px; text-align: center; text-decoration: none; font-weight: 600; display: block; }
    </style>
</head>
<body>
    <div class="topo-admin">
        <i class="material-icons" style="font-size: 48px;">admin_panel_settings</i>
        <h2>Painel de Controle</h2>
        <p>Olá, Vereador André</p>
    </div>

    <div class="grid-admin">
        <a href="gerenciar-mensagens.html" class="card-admin">
            <i class="material-icons">forum</i>
            <span>Mensagens Recebidas</span>
        </a>

        <a href="cadastrar-noticia.html" class="card-admin">
            <i class="material-icons">add_circle</i>
            <span>Postar Notícia</span>
        </a>

        <a href="gerenciar-posts.html" class="card-admin">
            <i class="material-icons">edit_note</i>
            <span>Editar/Excluir Posts</span>
        </a>

        <a href="cadastrar-sessao.html" class="card-admin">
            <i class="material-icons">video_call</i>
            <span>Nova Sessão</span>
        </a>
    </div>

    <a href="app.html" class="btn-sair">Sair do Painel</a>
</body>
</html>
