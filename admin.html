<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Área Administrativa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

/* TOPO */
.topo {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.voltar {
  background:#1e293b;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
}

/* FORM */
input, textarea {
  width:100%;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
  border:none;
}

textarea {
  min-height:100px;
}

/* BOTÃO */
button {
  margin-top:15px;
  padding:12px;
  width:100%;
  background:#22c55e;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:active {
  transform:scale(0.97);
}

/* LOGIN */
#painel { display:none; }

/* LOGO */
.logo-final {
  margin-top:40px;
  text-align:center;
}

.logo-final img {
  width:100px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="topo">
  <div class="voltar" onclick="voltar()">←</div>
  <div><b>Área Administrativa</b></div>
</div>

<!-- LOGIN -->
<div id="login">
  <input type="password" id="senha" placeholder="Digite a senha">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- PAINEL -->
<div id="painel">

  <input id="titulo" placeholder="Título">
  <input id="data" placeholder="Data">
  <input id="imagem" placeholder="Imagem (ex: imagens/foto.jpg)">
  <textarea id="texto" placeholder="Texto"></textarea>

  <button onclick="gerar()">Gerar notícia</button>

  <textarea id="resultado" placeholder="Código pronto para copiar"></textarea>

</div>

<!-- LOGO -->
<div class="logo-final">
  <img src="logo.png">
</div>

<script>
function voltar(){
  window.history.back();
}

function entrar(){
  let senha = document.getElementById("senha").value;

  if(senha === "123456"){
    document.getElementById("login").style.display = "none";
    document.getElementById("painel").style.display = "block";
  } else {
    alert("Senha incorreta");
  }
}

function gerar(){
  let titulo = document.getElementById("titulo").value;
  let data = document.getElementById("data").value;
  let imagem = document.getElementById("imagem").value;
  let texto = document.getElementById("texto").value;

  let json = `{
  "titulo": "${titulo}",
  "data": "${data}",
  "texto": "${texto}",
  "imagem": "${imagem}"
},`;

  document.getElementById("resultado").value = json;
}
</script>

</body>
</html>
