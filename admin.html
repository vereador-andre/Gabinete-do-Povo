<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Administrador</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(to bottom, #ffffff 70%, #dcfce7);
  color:#0f172a;
  padding:20px;
}

.topo {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.voltar {
  background:#1e3a8a;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

select, input, textarea {
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:14px;
}

textarea {
  min-height:120px;
}

button {
  margin-top:20px;
  width:100%;
  padding:14px;
  background:#1e3a8a;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.sucesso {
  display:none;
  margin-top:15px;
  background:#16a34a;
  padding:12px;
  border-radius:10px;
  color:white;
  text-align:center;
}

pre {
  background:#111827;
  color:#22c55e;
  padding:15px;
  border-radius:10px;
  margin-top:15px;
  font-size:12px;
  overflow:auto;
}

.logo-final {
  margin-top:40px;
  text-align:center;
}

.logo-final img {
  width:120px;
}

</style>
</head>

<body>

<div class="topo">
  <div class="voltar" onclick="voltar()">←</div>
  <b>Painel do Administrador</b>
</div>

<select id="tipo">
  <option value="indicacoes">Indicação</option>
  <option value="requerimentos">Requerimento</option>
  <option value="projetos">Projeto de Lei</option>
  <option value="acoes-atendidas">Ação Atendida</option>
</select>

<input type="text" id="titulo" placeholder="Título">
<input type="text" id="data" placeholder="Data (ex: 15/04/2026)">
<textarea id="texto" placeholder="Descrição"></textarea>

<button onclick="salvar()">
  Salvar no sistema
</button>Gerar Conteúdo</button>

<div class="sucesso" id="ok">
  ✅ Conteúdo gerado! Copie e cole no JSON correspondente.
</div>

<pre id="saida"></pre>

<div class="logo-final">
  <img src="logo.png">
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

// CONFIG DO SEU PROJETO
const firebaseConfig = {
  apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc",
  authDomain: "gabinete-do-povo.firebaseapp.com",
  projectId: "gabinete-do-povo",
  storageBucket: "gabinete-do-povo.firebasestorage.app",
  messagingSenderId: "450444313568",
  appId: "1:450444313568:web:e12ba742d940dc23e52185"
};

// INICIAR FIREBASE
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function salvar(){

  let tipo = document.getElementById("tipo").value;
  let titulo = document.getElementById("titulo").value;
  let data = document.getElementById("data").value;
  let texto = document.getElementById("texto").value;

  db.collection(tipo).add({
    titulo: titulo,
    data: data,
    texto: texto,
    criadoEm: new Date()
  })
  .then(() => {
    alert("Salvo com sucesso!");
  })
  .catch((error) => {
    alert("Erro ao salvar");
    console.log(error);
  });
}

</script>
</body>
</html>
