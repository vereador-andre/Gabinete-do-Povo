<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Administrador</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body { margin:0; font-family:'Poppins', sans-serif; background:linear-gradient(to bottom, #ffffff 70%, #dcfce7); color:#0f172a; padding:20px; }
  .topo { display:flex; align-items:center; justify-content: space-between; margin-bottom:20px; }
  .voltar { background:#1e3a8a; color:white; padding:10px 14px; border-radius:10px; cursor:pointer; }
  select, input, textarea { width:100%; padding:14px; margin-top:12px; border-radius:12px; border:1px solid #ccc; font-size:14px; box-sizing: border-box; }
  textarea { min-height:120px; }
  button { margin-top:20px; width:100%; padding:14px; background:#1e3a8a; border:none; border-radius:12px; color:white; font-weight:600; cursor:pointer; }
  .logo { margin-top:40px; text-align:center; }
  .logo img { width:130px; }

  /* LISTA ADMIN */
  .item-admin { background:white; padding:15px; border-radius:12px; margin-top:10px; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
  .item-admin button { margin-top:10px; margin-right:5px; padding:8px 10px; border:none; border-radius:8px; cursor:pointer; width:auto; }
  .btn-editar { background:#f59e0b; color:white; }
  .btn-excluir { background:#ef4444; color:white; }
  .tag-tipo { font-size: 10px; background: #e2e8f0; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; font-weight: bold; }
  
  .btn-sair { background:#ef4444; width:auto; padding:8px 15px; margin:0; font-size: 13px; }
</style>
</head>

<body>

<div class="topo">
  <div style="display: flex; align-items: center; gap: 10px;">
    <div class="voltar" onclick="voltar()">←</div>
    <b>Painel Administrativo</b>
  </div>
  <button class="btn-sair" onclick="logout()">Sair</button>
</div>

<select id="tipo" onchange="alternarInterface()">
  <option value="indicacoes">Indicações</option>
  <option value="requerimentos">Requerimentos</option>
  <option value="projetos">Projetos de Lei</option>
  <option value="acoes-atendidas">Ações Atendidas</option>
  <option value="noticias">Notícias</option>
  <option value="sessoes-ordinarias">Sessões Ordinárias</option>
  <option value="sessoes-extraordinarias">Sessões Extraordinárias</option>
  <option value="mensagens_contato">📩 Mensagens Recebidas</option>
</select>

<div id="containerCadastro">
  <input type="text" id="titulo" placeholder="Título">
  <input type="date" id="data">
  <textarea id="texto" placeholder="Descrição"></textarea>
  <input type="text" id="imagemLink" placeholder="Link de imagem ou vídeo">
  <button onclick="salvar()">Salvar no sistema</button>
</div>

<hr style="margin:30px 0">
<h3 id="tituloLista">📋 Gerenciar</h3>
<div id="listaAdmin"></div>

<div class="logo"><img src="logo.png"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc",
  authDomain: "gabinete-do-povo.firebaseapp.com",
  projectId: "gabinete-do-povo",
  storageBucket: "gabinete-do-povo.appspot.com",
  messagingSenderId: "450444313568",
  appId: "1:450444313568:web:e12ba742d940dc23e52185"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// 🔒 TRAVA DE SEGURANÇA: Verifica se está logado
auth.onAuthStateChanged((user) => {
  if (!user) {
    // Se não houver usuário logado, redireciona para o login
    window.location.href = "login.html";
  } else {
    // Se estiver logado, carrega a lista
    carregarLista();
  }
});

function logout() {
  if(confirm("Deseja sair do painel?")) {
    auth.signOut().then(() => {
      window.location.href = "login.html";
    });
  }
}

let editandoID = null;

function alternarInterface() {
  const tipo = document.getElementById("tipo").value;
  const container = document.getElementById("containerCadastro");
  container.style.display = (tipo === "mensagens_contato") ? "none" : "block";
  carregarLista();
}

function salvar(){
  let tipo = document.getElementById("tipo").value;
  let titulo = document.getElementById("titulo").value;
  let data = document.getElementById("data").value;
  let texto = document.getElementById("texto").value;
  let link = document.getElementById("imagemLink").value;

  if(!titulo || !data){ alert("Preencha título e data"); return; }

  let dados = { titulo, data, texto, imagem: link || "", criadoEm: new Date() };

  if(editandoID){
    db.collection(tipo).doc(editandoID).update(dados).then(() => {
      alert("Atualizado!");
      editandoID = null;
      limparCampos();
      carregarLista();
    });
  } else {
    db.collection(tipo).add(dados).then(() => {
      alert("Salvo com sucesso!");
      limparCampos();
      carregarLista();
    });
  }
}

function carregarLista(){
  let tipo = document.getElementById("tipo").value;
  document.getElementById("tituloLista").innerText = "📋 Gerenciar " + tipo.replace("_", " ");
  const lista = document.getElementById("listaAdmin");
  lista.innerHTML = "Carregando...";

  db.collection(tipo).orderBy(tipo === "mensagens_contato" ? "dataEnvio" : "criadoEm", "desc").get()
  .then(snapshot => {
    lista.innerHTML = "";
    snapshot.forEach(doc => {
      let n = doc.data();
      if(tipo === "mensagens_contato") {
        lista.innerHTML += `
          <div class="item-admin">
            <span class="tag-tipo">${n.tipo || 'Mensagem'}</span><br>
            <b>${n.nome}</b> (${n.bairro})<br>
            <p style="font-size:13px; margin:5px 0;">${n.mensagem}</p>
            <div><button class="btn-excluir" onclick="excluir('${doc.id}')">Excluir</button></div>
          </div>`;
      } else {
        lista.innerHTML += `
          <div class="item-admin">
            <b>${n.titulo}</b><br><small>${n.data}</small>
            <div>
              <button class="btn-editar" onclick="editar('${doc.id}', '${n.titulo}', '${n.data}', \`${n.texto}\`, '${n.imagem}')">Editar</button>
              <button class="btn-excluir" onclick="excluir('${doc.id}')">Excluir</button>
            </div>
          </div>`;
      }
    });
  });
}

function editar(id, titulo, data, texto, imagem){
  document.getElementById("titulo").value = titulo;
  document.getElementById("data").value = data;
  document.getElementById("texto").value = texto;
  document.getElementById("imagemLink").value = imagem;
  editandoID = id;
  window.scrollTo(0,0);
}

function excluir(id){
  let tipo = document.getElementById("tipo").value;
  if(confirm("Excluir permanentemente?")){
    db.collection(tipo).doc(id).delete().then(() => {
      alert("Excluído!");
      carregarLista();
    });
  }
}

function limparCampos(){
  document.getElementById("titulo").value = "";
  document.getElementById("data").value = "";
  document.getElementById("texto").value = "";
  document.getElementById("imagemLink").value = "";
}

function voltar(){
  window.location.href = "index.html";
}
</script>
</body>
</html>
