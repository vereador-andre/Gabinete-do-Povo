<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel do Administrador</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(to bottom, #ffffff 70%, #dcfce7);
  color:#0f172a;
  padding:20px;
}

.topo {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.voltar {
  background:#1e3a8a;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}

select, input, textarea {
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:14px;
}

textarea {
  min-height:120px;
}

button {
  margin-top:20px;
  width:100%;
  padding:14px;
  background:#1e3a8a;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.logo {
  margin-top:40px;
  text-align:center;
}

.logo img {
  width:130px;
}

</style>
</head>

<body>

<div class="topo">
  <div class="voltar" onclick="voltar()">←</div>
  <b>Painel do Administrador</b>
</div>

<select id="tipo">
  <option value="indicacoes">Indicação</option>
  <option value="requerimentos">Requerimento</option>
  <option value="projetos">Projeto de Lei</option>
  <option value="acoes-atendidas">Ação Atendida</option>
  <option value="noticias">Notícia</option>
  <option value="sessoes-ordinarias">Sessão Ordinária</option>
  <option value="sessoes-extraordinarias">Sessão Extraordinária</option>
</select>

<input type="text" id="titulo" placeholder="Título">

<!-- 📅 DATA COM CALENDÁRIO -->
<input type="date" id="data">

<textarea id="texto" placeholder="Descrição"></textarea>

<!-- 📷 UPLOAD DE IMAGEM -->
<input type="file" id="imagemFile" accept="image/*">

<!-- 🔗 LINK DE IMAGEM OU VÍDEO -->
<input type="text" id="imagemLink" placeholder="Ou cole link de imagem/vídeo">

<button onclick="salvar()">Salvar no sistema</button>

<div class="logo">
  <img src="logo.png">
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc",
  authDomain: "gabinete-do-povo.firebaseapp.com",
  projectId: "gabinete-do-povo",
  storageBucket: "gabinete-do-povo.appspot.com",
  messagingSenderId: "450444313568",
  appId: "1:450444313568:web:e12ba742d940dc23e52185"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

/* SALVAR */
function salvar(){

  let tipo = document.getElementById("tipo").value;
  let titulo = document.getElementById("titulo").value;
  let data = document.getElementById("data").value;
  let texto = document.getElementById("texto").value;

  let file = document.getElementById("imagemFile").files[0];
  let link = document.getElementById("imagemLink").value;

  if(file){
    uploadImagem(file, tipo, titulo, data, texto);
  } else {
    salvarFirestore(tipo, titulo, data, texto, link);
  }
}

/* UPLOAD IMAGEM */
function uploadImagem(file, tipo, titulo, data, texto){

  let nomeArquivo = Date.now() + "_" + file.name;

  let ref = storage.ref("imagens/" + nomeArquivo);

  ref.put(file).then(snapshot => {

    snapshot.ref.getDownloadURL().then(url => {

      salvarFirestore(tipo, titulo, data, texto, url);

    });

  }).catch(() => {
    alert("Erro ao enviar imagem");
  });
}

/* SALVAR NO FIRESTORE */
function salvarFirestore(tipo, titulo, data, texto, imagem){

  db.collection(tipo).add({
    titulo: titulo,
    data: data,
    texto: texto,
    imagem: imagem || "",
    criadoEm: new Date()
  })
  .then(() => {
    alert("Salvo com sucesso!");
  })
  .catch((error) => {
    alert("Erro ao salvar");
    console.log(error);
  });
}

/* VOLTAR */
function voltar(){
  window.location.href = "app.html";
}

</script>

</body>
</html>
