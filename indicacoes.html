<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indicações</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {margin:0;font-family:'Poppins';background:#0f172a;color:white;padding:20px;}
.topo {display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.voltar {background:#1e293b;padding:10px 15px;border-radius:10px;cursor:pointer;}
.feed {display:flex;flex-direction:column;gap:15px;}
.post {background:rgba(255,255,255,0.05);border-radius:15px;overflow:hidden;}
.post img {width:100%;}
.post-content {padding:15px;}
.post-title {font-weight:600;}
.post-date {font-size:12px;color:#94a3b8;margin:5px 0;}
.logo {text-align:center;margin-top:30px;}
.logo img {width:90px;opacity:0.6;}
</style>
</head>

<body>

<div class="topo">
  <div class="voltar" onclick="voltar()">←</div>
  <b>Indicações</b>
</div>

<div class="feed" id="feed"></div>

<div class="logo">
  <img src="logo.png">
</div>

<script>
async function carregar(){
  const res = await fetch("indicacoes.json");
  const dados = await res.json();

  const feed = document.getElementById("feed");

  dados.reverse().forEach(item=>{
    feed.innerHTML += `
    <div class="post">
      ${item.imagem ? `<img src="${item.imagem}">` : ``}
      <div class="post-content">
        <div class="post-title">${item.titulo}</div>
        <div class="post-date">${item.data}</div>
        <div>${item.texto}</div>
      </div>
    </div>`;
  });
}
carregar();

function voltar(){ window.history.back(); }
</script>

</body>
</html>
