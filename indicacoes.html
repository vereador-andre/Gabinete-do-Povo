<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Indicações</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

.topo {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.voltar {
  background:#1e293b;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
}

.feed {
  margin-top:20px;
}

.post {
  background:#1e293b;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
}

.post-title {
  font-weight:600;
  margin-bottom:5px;
}

.post-date {
  font-size:12px;
  color:#94a3b8;
  margin-bottom:10px;
}

.post-text {
  font-size:14px;
}

/* MÍDIA */
.post img {
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

iframe {
  width:100%;
  height:200px;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
}

/* LOGO */
.logo {
  text-align:center;
  margin-top:30px;
}

.logo img {
  width:100px;
  opacity:0.8;
}

</style>
</head>

<body>

<div class="topo">
  <div class="voltar" onclick="voltar()">←</div>
  <b>Indicações</b>
</div>

<div class="feed" id="feed"></div>

<div class="logo">
  <img src="logo.png">
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc",
  authDomain: "gabinete-do-povo.firebaseapp.com",
  projectId: "gabinete-do-povo",
  storageBucket: "gabinete-do-povo.appspot.com",
  messagingSenderId: "450444313568",
  appId: "1:450444313568:web:e12ba742d940dc23e52185"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* YOUTUBE */
function extrairYouTubeID(url){
  try{
    let regExp = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/;
    let match = url.match(regExp);
    return match ? match[1] : null;
  }catch{
    return null;
  }
}

/* CARREGAR */
function carregar(){

  const feed = document.getElementById("feed");

  db.collection("indicacoes")
  .orderBy("criadoEm", "desc")
  .get()
  .then(snapshot => {

    snapshot.forEach(doc => {

      let n = doc.data();

      let midia = "";

      let videoID = extrairYouTubeID(n.imagem);

      if(videoID){
        midia = `<iframe src="https://www.youtube.com/embed/${videoID}" allowfullscreen></iframe>`;
      }
      else if(n.imagem){
        midia = `<img src="${n.imagem}">`;
      }

      feed.innerHTML += `
        <div class="post">
          ${midia}
          <div class="post-title">${n.titulo}</div>
          <div class="post-date">${n.data}</div>
          <div class="post-text">${n.texto}</div>
        </div>
      `;

    });

  });

}

carregar();

function voltar(){
  window.history.back();
}

</script>

</body>
</html>
