<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e3a8a"> 
    <title>Gabinete do Povo - André de Dedé</title>

    <link rel="manifest" href="manifest.json?v=2">


    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="André de Dedé">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/dt1gSyRJ/fotologo.png">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <style>
        :root {
            --primary: #22c55e;
            --secondary: #1e3a8a;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100%; 
            font-family: 'Poppins', sans-serif; 
            overflow: hidden; 
            background: var(--secondary); 
        }
        
        .bg-fundo {
            background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.95)), url('fundo.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 30px;
            box-sizing: border-box;
        }

        /* Banner de Instrução de Instalação */
        #pwa-install-banner {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            color: #1e3a8a;
            padding: 15px;
            border-radius: 20px;
            z-index: 9999;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: left;
            font-size: 13px;
            animation: fadeInUp 0.5s ease-out;
            border-left: 5px solid var(--primary);
        }

        .conteudo-header {
            animation: fadeInUp 0.8s ease-out;
            margin-bottom: 50px;
        }

        h1 { 
            font-size: 34px; 
            margin: 0; 
            font-weight: 600; 
            letter-spacing: -0.5px;
            background: linear-gradient(to bottom, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .frase { 
            font-size: 16px; 
            margin: 8px 0; 
            font-weight: 300; 
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        .vereador { 
            display: inline-block;
            font-size: 12px; 
            margin-top: 15px;
            padding: 6px 16px;
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 50px;
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary); 
        }

        .btn-container { 
            width: 100%; 
            max-width: 320px; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            animation: fadeInUp 1s ease-out both;
            animation-delay: 0.3s;
        }

        .btn-opcao {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px; 
            padding: 20px;
            border-radius: 18px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .btn-cidadao { background: var(--primary); color: white; }
        .btn-admin { background: rgba(255, 255, 255, 0.1); color: white; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="pwa-install-banner">
        <div style="display:flex; align-items:center; gap:10px;">
            <i class="material-icons" style="color:var(--primary)">add_to_home_screen</i>
            <div>
                <strong>Instale o nosso App!</strong><br>
                Clique em <i class="material-icons" style="font-size:16px">ios_share</i> e depois em <b>"Adicionar à Tela de Início"</b> para usar em tela cheia.
            </div>
            <i class="material-icons" onclick="this.parentElement.parentElement.style.display='none'" style="cursor:pointer">close</i>
        </div>
    </div>

    <div class="bg-fundo">
        <div class="conteudo-header">
            <h1>Gabinete do Povo</h1>
            <div class="frase">Transparência e Responsabilidade</div>
            <div class="vereador">André de Dedé</div>
        </div>

        <div class="btn-container">
            <a href="app.html" class="btn-opcao btn-cidadao">
                <i class="material-icons">person</i>
                Entrar como Cidadão
            </a>
            <a href="login.html" class="btn-opcao btn-admin">
                <i class="material-icons">admin_panel_settings</i>
                Área do Administrador
            </a>
        </div>

        <div class="footer-tag" style="margin-top:40px; font-size:10px; color:rgba(255,255,255,0.3); letter-spacing:1px; text-transform:uppercase;">Mandato Areia Branca/RN</div>
    </div>

    <script>
        // Lógica para detectar se o site já está instalado ou rodando no navegador
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        
        if (!isStandalone) {
            // Se estiver no navegador, mostra o banner de instalação após 3 segundos
            setTimeout(() => {
                document.getElementById('pwa-install-banner').style.display = 'block';
            }, 3000);
        }

        // Registrar o Service Worker (necessário para PWA)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('layout.js');
        }
    </script>
</body>
</html>
