<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabinete do Povo - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Poppins', sans-serif; }

        .bg-fundo {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('fundo.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo-home { width: 120px; margin-bottom: 15px; }
        h1 { font-size: 26px; margin: 0; }
        p { font-size: 16px; margin-bottom: 40px; opacity: 0.9; }

        .btn-container { width: 100%; max-width: 280px; display: flex; flex-direction: column; gap: 15px; }

        .btn-opcao {
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
        }

        .btn-cidadao { background: #22c55e; color: white; }
        .btn-admin { background: white; color: #1e3a8a; }
        .btn-opcao:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="bg-fundo">
        <img src="logo.png" alt="Logo" class="logo-home">
        <h1>Gabinete do Povo</h1>
        <p>Vereador André de Dedé</p>

        <div class="btn-container">
            <a href="app.html" class="btn-opcao btn-cidadao">Entrar como Cidadão</a>
            <a href="login.html" class="btn-opcao btn-admin">Área do Administrador</a>
        </div>
    </div>

</body>
</html>
