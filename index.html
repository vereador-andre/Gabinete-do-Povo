<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5PL1D78HGL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5PL1D78HGL');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1e3a8a"> 
    <title>Gabinete do Povo - André de Dedé</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="iconeapp.jpg">
    <link rel="apple-touch-icon" href="iconeapp.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #22c55e; --secondary: #1e3a8a; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; font-family: 'Poppins', sans-serif; overflow: hidden; background: var(--secondary); }
        
        .bg-fundo {
            /* REFINAMENTO: Degradê um pouco mais escuro no topo e base para destacar o texto e a frase do fundo */
            background-image: linear-gradient(to bottom, rgba(15, 23, 42, 0.7) 0%, rgba(15, 23, 42, 0.9) 50%, rgba(15, 23, 42, 0.98) 100%), url('fundo.jpg');
            background-size: cover; background-position: center; height: 100vh;
            display: flex; flex-direction: column; align-items: center; 
            justify-content: flex-end; 
            text-align: center; color: white; padding: 30px; padding-bottom: 60px; box-sizing: border-box;
        }

        .conteudo-header { animation: fadeInUp 0.8s ease-out; margin-bottom: 40px; }
        h1 { font-size: 34px; margin: 0; font-weight: 600; color: white; }
        
        /* REFINAMENTO: Espaçamento entre letras para elegância */
        .frase { font-size: 14px; margin: 8px 0; color: #cbd5e1; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 300; }
        
        .btn-container { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 16px; animation: fadeInUp 1s ease-out both; }
        
        .btn-opcao { 
            display: flex; align-items: center; justify-content: center; gap: 12px; padding: 18px; 
            border-radius: 18px; font-size: 16px; font-weight: 600; text-decoration: none; 
            transition: transform 0.1s, background 0.3s; /* Transição rápida para o toque */
        }

        /* REFINAMENTO: Efeito de clique (escala) para sensação de app nativo */
        .btn-opcao:active { transform: scale(0.95); }
        
        .btn-cidadao { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        .btn-admin { background: rgba(255, 255, 255, 0.1); color: white; backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .container-icone-pwa { margin-top: 40px; animation: animaProfissional 4s ease-in-out infinite; }
        .icone-pwa { width: 90px; height: 90px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        
        #pwa-install-banner {
            display: none; position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: white; color: #333; padding: 15px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 9999;
            animation: fadeInUp 0.5s ease-out;
        }
        .pwa-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .pwa-header img { width: 40px; height: 40px; border-radius: 8px; }
        .pwa-header h3 { margin: 0; font-size: 14px; color: #1e3a8a; }
        .pwa-body { font-size: 12px; color: #64748b; text-align: left; line-height: 1.4; }
        .btn-instalar-pwa { background: #1e3a8a; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; margin-top: 10px; font-weight: 600; font-family: 'Poppins'; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes animaProfissional { 0%, 100% { transform: translateY(0); filter: brightness(1); } 50% { transform: translateY(-12px); filter: brightness(1.15); } }
    </style>
</head>
<body>
    <div class="bg-fundo">
        <div class="conteudo-header">
            <h1>Gabinete do Povo</h1>
            <div class="frase">Transparência e Responsabilidade</div>
            <div class="vereador" style="color:var(--primary); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; margin-top: 10px;">Bem-vindo</div>
        </div>
        <div class="btn-container">
            <a href="app.html" class="btn-opcao btn-cidadao"> <i class="material-icons">person</i> Entrar como Cidadão </a>
            <a href="login.html" class="btn-opcao btn-admin"> <i class="material-icons">admin_panel_settings</i> Área Administrativa </a>
        </div>
        <div class="container-icone-pwa"> <img src="iconeapp.jpg" class="icone-pwa"> </div>
        <div style="margin-top:20px; font-size:10px; color:rgba(255,255,255,0.3); letter-spacing:1px;">AREIA BRANCA/RN ®️</div>
    </div>

    <div id="pwa-install-banner">
        <div class="pwa-header">
            <img src="iconeapp.jpg">
            <h3>Instalar o Gabinete do Povo</h3>
        </div>
        <div id="instrucao-pwa" class="pwa-body"></div>
        <button class="btn-instalar-pwa" onclick="fecharBanner()">ENTENDI</button>
    </div>

    <script>
        window.addEventListener('load', function() {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isAndroid = /Android/.test(navigator.userAgent);
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            const banner = document.getElementById('pwa-install-banner');
            const instrucao = document.getElementById('instrucao-pwa');

            if (!isStandalone) {
                if (isIOS) {
                    instrucao.innerHTML = 'Toque no ícone de <b>Compartilhar</b> <i class="material-icons" style="font-size:14px; vertical-align:middle;">ios_share</i> e selecione <b>"Adicionar à Tela de Início"</b> para facilitar o acesso.';
                    banner.style.display = 'block';
                } else if (isAndroid) {
                    instrucao.innerHTML = 'Toque nos <b>três pontinhos</b> <i class="material-icons" style="font-size:14px; vertical-align:middle;">more_vert</i> e selecione <b>"Instalar aplicativo"</b> ou <b>"Adicionar à Tela Inicial"</b>.';
                    banner.style.display = 'block';
                }
            }
        });

        function fecharBanner() {
            document.getElementById('pwa-install-banner').style.display = 'none';
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW erro:', err));
        }
    </script>
</body>
</html>
