<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagens Recebidas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; }
        .topo { background:#1e3a8a; color:white; padding:20px; display:flex; align-items:center; gap:15px; }
        .container { padding: 15px; }
        .card-msg { background:white; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #cbd5e1; }
        
        /* Estilos para Foto e Localização */
        .foto-anexo { width: 100%; border-radius: 10px; margin-top: 10px; display: block; border: 1px solid #e2e8f0; }
        .btn-localizacao { 
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: #3b82f6; color: white; text-decoration: none; padding: 10px;
            border-radius: 10px; margin-top: 10px; font-weight: 600; font-size: 13px;
        }

        .status-select { 
            width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; 
            font-family: inherit; font-size: 13px; font-weight: 600; border: 1px solid #e2e8f0;
        }
        .btn-whatsapp {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: #25d366; color: white; text-decoration: none; padding: 12px;
            border-radius: 10px; margin-top: 10px; font-weight: 600; font-size: 14px;
        }
        .acoes-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 10px; border-top: 1px solid #f1f5f9; }
    </style>
</head>
<body>
<div class="topo">
    <i class="material-icons" onclick="location.href='admin.html'" style="cursor:pointer">arrow_back</i>
    <span>Mensagens do Público</span>
</div>
<div class="container" id="lista">Carregando...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function mudarStatus(id, novoStatus) {
        db.collection("contatos").doc(id).update({ status: novoStatus });
    }

    db.collection("contatos").orderBy("criadoEm", "desc").onSnapshot(snapshot => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";
        snapshot.forEach(doc => {
            const m = doc.data();
            const id = doc.id;
            const status = m.status || "Pendente";
            const zapLimpo = m.whatsapp ? m.whatsapp.replace(/\D/g, '') : "";

            // Verifica se existe foto e localização para montar o HTML extra
            const htmlFoto = m.foto ? `<img src="${m.foto}" class="foto-anexo">` : "";
            const htmlLocal = m.localizacao ? `
                <a href="${m.localizacao}" target="_blank" class="btn-localizacao">
                    <i class="material-icons">location_on</i> Ver Localização no Mapa
                </a>` : "";

            lista.innerHTML += `
                <div class="card-msg">
                    <div style="display:flex; justify-content:space-between; font-size:12px;">
                        <strong style="color:#1e3a8a;">${m.nome}</strong> 
                        <span class="badge" style="background:#f1f5f9; padding:2px 8px; border-radius:5px; color:#64748b;">${m.tipo || 'Mensagem'}</span>
                    </div>
                    
                    <p style="font-size:14px; margin:10px 0; color:#475569;">${m.mensagem}</p>
                    
                    ${htmlFoto}
                    ${htmlLocal}
                    
                    <div style="margin-top:10px; font-size:11px; color:#94a3b8; text-align:right;">Enviado em: ${m.data}</div>

                    <select class="status-select" onchange="mudarStatus('${id}', this.value)">
                        <option value="Pendente" ${status=='Pendente'?'selected':''}>⏳ Pendente</option>
                        <option value="Em andamento" ${status=='Em andamento'?'selected':''}>⚙️ Em andamento</option>
                        <option value="Atendido" ${status=='Atendido'?'selected':''}>✅ Atendido</option>
                        <option value="Não Atendido" ${status=='Não Atendido'?'selected':''}>❌ Não Atendido</option>
                    </select>

                    <a href="https://wa.me/55${zapLimpo}" target="_blank" class="btn-whatsapp">
                        <i class="material-icons">chat</i> Responder via WhatsApp
                    </a>

                    <div class="acoes-footer">
                        <small style="color:#94a3b8;">ID: ${id.substring(0,5)}</small>
                        <button onclick="if(confirm('Excluir mensagem?')) db.collection('contatos').doc('${id}').delete()" style="border:none; background:none; color:#ef4444; display:flex; align-items:center; gap:5px; cursor:pointer;">
                            <i class="material-icons" style="font-size:18px;">delete</i> Excluir
                        </button>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
