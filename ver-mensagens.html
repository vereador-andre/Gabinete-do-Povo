<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagens Recebidas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; }
        .topo { background:#1e3a8a; color:white; padding:20px; display:flex; align-items:center; gap:15px; }
        .container { padding: 15px; }
        .card-msg { background:white; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05); }
        .status-select { 
            width: 100%; padding: 8px; border-radius: 8px; margin-top: 10px; 
            font-family: inherit; font-size: 12px; font-weight: 600;
        }
        /* Cores para os status */
        .st-pendente { background: #fef9c3; color: #854d0e; }
        .st-andamento { background: #dbeafe; color: #1e40af; }
        .st-atendido { background: #dcfce7; color: #166534; }
        .st-naoatendido { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
<div class="topo">
    <i class="material-icons" onclick="history.back()">arrow_back</i>
    <span>Mensagens do Público</span>
</div>
<div class="container" id="lista">Carregando...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function mudarStatus(id, novoStatus) {
        db.collection("contatos").doc(id).update({ status: novoStatus });
    }

    db.collection("contatos").orderBy("criadoEm", "desc").onSnapshot(snapshot => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";
        snapshot.forEach(doc => {
            const m = doc.data();
            const id = doc.id;
            const status = m.status || "Pendente";
            
            lista.innerHTML += `
                <div class="card-msg">
                    <div style="display:flex; justify-content:space-between; font-size:12px;">
                        <strong>${m.nome}</strong> <span>${m.data}</span>
                    </div>
                    <p style="font-size:14px; margin:10px 0;">${m.mensagem}</p>
                    <select class="status-select" onchange="mudarStatus('${id}', this.value)">
                        <option value="Pendente" ${status=='Pendente'?'selected':''}>⏳ Pendente</option>
                        <option value="Em andamento" ${status=='Em andamento'?'selected':''}>⚙️ Em andamento</option>
                        <option value="Atendido" ${status=='Atendido'?'selected':''}>✅ Atendido</option>
                        <option value="Não Atendido" ${status=='Não Atendido'?'selected':''}>❌ Não Atendido</option>
                    </select>
                    <button onclick="if(confirm('Excluir?')) db.collection('contatos').doc('${id}').delete()" style="margin-top:10px; border:none; background:none; color:red; font-size:12px; display:flex; align-items:center; gap:5px;">
                        <i class="material-icons" style="font-size:16px;">delete</i> Excluir
                    </button>
                </div>`;
        });
    });
</script>
</body>
</html>
