<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Mandato - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 40px; }
        .topo { background:#1e3a8a; color:white; padding:20px; display:flex; align-items:center; gap:15px; position: sticky; top:0; z-index:100; }
        .tabs { display: flex; background: white; padding: 10px; gap: 5px; border-bottom: 1px solid #e2e8f0; overflow-x: auto; }
        .tab-btn { flex:none; min-width: 100px; padding: 10px; border-radius: 12px; border: none; background: #f1f5f9; color: #64748b; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .tab-btn.active { background: #1e3a8a; color: white; }
        
        .container { padding: 15px; }
        .secao { display: none; }
        .secao.active { display: block; }
        
        .dash-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .dash-card { background: white; padding: 10px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 3px solid #1e3a8a; }
        .dash-card small { font-size: 9px; color: #64748b; text-transform: uppercase; display: block; }
        .dash-card span { font-size: 16px; font-weight: 600; color: #1e3a8a; }

        .card-controle { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .form-controle { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-top: 8px; box-sizing: border-box; font-family: 'Poppins'; font-size: 14px; outline: none; }
        .btn-acao { background: #1e3a8a; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; margin-top: 15px; font-weight: 600; cursor: pointer; }
        
        .badge-status { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .status-pendente { background: #fee2e2; color: #991b1b; }
        .status-atendido { background: #dcfce7; color: #166534; }
        .status-confirmado { background: #dbeafe; color: #1e40af; }
        
        .info-card { font-size: 13px; color: #475569; margin-top: 8px; border-top: 1px solid #f1f5f9; padding-top: 8px; display: flex; justify-content: space-between; align-items: center; }
        .label-topo { font-size: 10px; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="topo">
    <i class="material-icons" onclick="location.href='admin.html'" style="cursor:pointer">arrow_back</i>
    <span style="font-weight:600">Controle Estratégico</span>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab(event, 'demandas')"><i class="material-icons">handshake</i> Pedidos</button>
    <button class="tab-btn" onclick="switchTab(event, 'agenda')"><i class="material-icons">forum</i> Reuniões</button>
    <button class="tab-btn" onclick="switchTab(event, 'eventos')"><i class="material-icons">event_available</i> Eventos</button>
</div>

<div class="container">
    
    <div id="demandas" class="secao active">
        <div class="dash-container">
            <div class="dash-card"><small>Total</small><span id="totalPedidos">0</span></div>
            <div class="dash-card"><small>Urbana</small><span id="totalUrbana">0</span></div>
            <div class="dash-card"><small>Rural</small><span id="totalRural">0</span></div>
        </div>
        <div class="card-controle">
            <h4 style="margin:0">Novo Registro de Ajuda</h4>
            <input type="text" id="pessoaNome" class="form-controle" placeholder="Nome do Cidadão">
            <input type="text" id="pessoaBairro" class="form-controle" placeholder="Bairro/Comunidade">
            <select id="pessoaZona" class="form-controle">
                <option value="Urbana">Zona Urbana</option>
                <option value="Rural">Zona Rural</option>
            </select>
            <select id="liderancaVinculo" class="form-controle"><option value="">Carregando Lideranças...</option></select>
            <textarea id="pedidoDescricao" class="form-controle" style="height:70px" placeholder="O que foi solicitado?"></textarea>
            <button class="btn-acao" onclick="salvarPedido()">Salvar Registro</button>
        </div>
        <input type="text" id="buscaCrm" class="form-controle" style="margin-bottom:15px" placeholder="🔍 Buscar nome, bairro ou líder..." onkeyup="filtrarCards('item-crm', this.value)">
        <div id="listaPedidos"></div>
    </div>

    <div id="agenda" class="secao">
        <div class="card-controle">
            <h4 style="margin:0">Agendar Reunião de Gabinete</h4>
            <input type="date" id="agendaData" class="form-controle">
            <input type="text" id="agendaComQuem" class="form-controle" placeholder="Com quem será a conversa?">
            <textarea id="agendaAssunto" class="form-controle" placeholder="Pauta / Assuntos"></textarea>
            <select id="agendaStatus" class="form-controle">
                <option value="Pendente">⏳ Pendente</option>
                <option value="Tratado">⚙️ Em Tratativa</option>
                <option value="Atendido">✅ Finalizado</option>
            </select>
            <button class="btn-acao" onclick="salvarAgenda()" style="background:#0f172a">Salvar na Agenda</button>
        </div>
        <div id="listaAgenda"></div>
    </div>

    <div id="eventos" class="secao">
        <div class="card-controle" style="border-top: 4px solid #f59e0b;">
            <h4 style="margin:0">Novo Evento Externo</h4>
            <input type="date" id="eventData" class="form-controle">
            <input type="time" id="eventHora" class="form-controle">
            <input type="text" id="eventTitulo" class="form-controle" placeholder="Título do Evento (Ex: Sessão Solene)">
            <input type="text" id="eventLocal" class="form-controle" placeholder="Local do Evento">
            <select id="eventTraje" class="form-controle">
                <option value="Social/Terno">👔 Social/Terno</option>
                <option value="Esporte Fino">👕 Esporte Fino</option>
                <option value="Casual/Campo">👟 Casual/Campo</option>
            </select>
            <textarea id="eventObs" class="form-controle" placeholder="Observações importantes ou quem acompanhará"></textarea>
            <button class="btn-acao" onclick="salvarEvento()" style="background:#f59e0b">Registrar Compromisso</button>
        </div>
        <div id="listaEventos"></div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function switchTab(evt, tabName) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    // --- LOGICA DE PEDIDOS ---
    function salvarPedido() {
        const d = {
            nome: document.getElementById("pessoaNome").value,
            bairro: document.getElementById("pessoaBairro").value,
            zona: document.getElementById("pessoaZona").value,
            lideranca: document.getElementById("liderancaVinculo").value || "Direto",
            descricao: document.getElementById("pedidoDescricao").value,
            data: new Date().toLocaleDateString('pt-BR'),
            criadoEm: firebase.firestore.FieldValue.serverTimestamp()
        };
        if(!d.nome) return alert("Nome obrigatório");
        db.collection("crm_pedidos").add(d).then(() => { alert("Salvo!"); location.reload(); });
    }

    // --- LOGICA DE REUNIÕES ---
    function salvarAgenda() {
        const d = {
            dataComp: document.getElementById("agendaData").value,
            comQuem: document.getElementById("agendaComQuem").value,
            assunto: document.getElementById("agendaAssunto").value,
            status: document.getElementById("agendaStatus").value,
            tipo: "Reunião",
            criadoEm: firebase.firestore.FieldValue.serverTimestamp()
        };
        db.collection("agenda_vereador").add(d).then(() => alert("Agendado!"));
    }

    // --- LOGICA DE EVENTOS EXTERNOS ---
    function salvarEvento() {
        const d = {
            data: document.getElementById("eventData").value,
            hora: document.getElementById("eventHora").value,
            titulo: document.getElementById("eventTitulo").value,
            local: document.getElementById("eventLocal").value,
            traje: document.getElementById("eventTraje").value,
            obs: document.getElementById("eventObs").value,
            criadoEm: firebase.firestore.FieldValue.serverTimestamp()
        };
        if(!d.titulo || !d.data) return alert("Título e data obrigatórios");
        db.collection("eventos_externos").add(d).then(() => { alert("Compromisso registrado!"); location.reload(); });
    }

    // --- CARREGAMENTO DE DADOS ---
    db.collection("liderancas").orderBy("nome").onSnapshot(snap => {
        const select = document.getElementById("liderancaVinculo");
        select.innerHTML = '<option value="">Direto com Vereador</option>';
        snap.forEach(doc => select.innerHTML += `<option value="${doc.data().nome}">${doc.data().nome}</option>`);
    });

    db.collection("crm_pedidos").orderBy("criadoEm", "desc").onSnapshot(snap => {
        const lista = document.getElementById("listaPedidos");
        let urb=0, rur=0, tot=0; lista.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data(); tot++; d.zona=="Urbana"?urb++:rur++;
            lista.innerHTML += `<div class="card-controle item-crm">
                <div class="label-topo">${d.data} | ${d.zona}</div>
                <strong style="color:#1e3a8a; display:block; margin:5px 0;">${d.nome}</strong>
                <div style="font-size:13px;">${d.descricao}</div>
                <div class="info-card"><span>📍 ${d.bairro}</span> <span>👤 Líder: ${d.lideranca}</span></div>
            </div>`;
        });
        document.getElementById("totalPedidos").innerText = tot;
        document.getElementById("totalUrbana").innerText = urb;
        document.getElementById("totalRural").innerText = rur;
    });

    db.collection("agenda_vereador").orderBy("dataComp", "asc").onSnapshot(snap => {
        const lista = document.getElementById("listaAgenda");
        lista.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            lista.innerHTML += `<div class="card-controle">
                <div style="display:flex; justify-content:space-between"><span class="label-topo">${d.dataComp}</span><span class="badge-status status-${d.status.toLowerCase()}">${d.status}</span></div>
                <strong style="display:block; margin:5px 0;">${d.comQuem}</strong>
                <div style="font-size:12px; color:#64748b">${d.assunto}</div>
            </div>`;
        });
    });

    db.collection("eventos_externos").orderBy("data", "asc").onSnapshot(snap => {
        const lista = document.getElementById("listaEventos");
        lista.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            lista.innerHTML += `<div class="card-controle" style="border-left: 5px solid #f59e0b;">
                <div style="display:flex; justify-content:space-between">
                    <span class="label-topo">📅 ${d.data.split('-').reverse().join('/')} às ${d.hora}</span>
                    <span class="badge-status status-confirmado">Confirmado</span>
                </div>
                <strong style="display:block; margin:5px 0; color:#b45309">${d.titulo}</strong>
                <div style="font-size:13px; font-weight:600">📍 ${d.local}</div>
                <div style="font-size:12px; color:#64748b; margin-top:5px;">👔 Traje: ${d.traje}</div>
                <div style="font-size:12px; font-style:italic; margin-top:5px;">${d.obs}</div>
                <div style="text-align:right"><i class="material-icons" style="color:#ef4444; font-size:18px; cursor:pointer" onclick="db.collection('eventos_externos').doc('${doc.id}').delete()">delete</i></div>
            </div>`;
        });
    });

    function filtrarCards(classe, termo) {
        termo = termo.toLowerCase();
        document.querySelectorAll('.'+classe).forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(termo) ? "block" : "none";
        });
    }
</script>
</body>
</html>
