<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Estratégico - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 40px; }
        .topo { background:#1e3a8a; color:white; padding:20px; display:flex; align-items:center; gap:15px; position: sticky; top:0; z-index:100; }
        .tabs { display: flex; background: white; padding: 10px; gap: 5px; border-bottom: 1px solid #e2e8f0; overflow-x: auto; }
        .tab-btn { flex:none; min-width: 100px; padding: 10px; border-radius: 12px; border: none; background: #f1f5f9; color: #64748b; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .tab-btn.active { background: #1e3a8a; color: white; }
        .container { padding: 15px; }
        .secao { display: none; }
        .secao.active { display: block; }
        
        .dash-resumo { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .card-mini { background: white; padding: 12px; border-radius: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-bottom: 3px solid #1e3a8a; display: flex; flex-direction: column; justify-content: center; }
        .card-mini span { display: block; font-size: 16px; font-weight: 600; color: #1e3a8a; }
        .card-mini label { font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: 600; margin-bottom: 5px; }
        
        .dash-detalhe { font-size: 9px; display: flex; justify-content: space-around; margin-top: 5px; border-top: 1px solid #f1f5f9; padding-top: 5px; }
        .det-urb { color: #1e3a8a; font-weight: 600; }
        .det-rur { color: #854d0e; font-weight: 600; }

        .filtro-periodo { background: #e2e8f0; padding: 12px; border-radius: 15px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: space-between; }
        .filtro-periodo label { font-size: 10px; font-weight: 700; color: #1e3a8a; text-transform: uppercase; display: block; }
        .input-filtro { border: 1px solid #cbd5e1; border-radius: 8px; padding: 5px; font-family: 'Poppins'; font-size: 12px; outline: none; }

        .card-controle { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .form-controle { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-top: 8px; box-sizing: border-box; font-family: 'Poppins'; font-size: 14px; outline: none; display: block; min-height: 45px; }
        .btn-acao { background: #1e3a8a; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; margin-top: 15px; font-weight: 600; cursor: pointer; }
        .badge-bairro { background: #e0f2fe; color: #0369a1; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-top: 5px; display: inline-block; }
        .label-topo { font-size: 10px; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
        .acoes-card { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
        .btn-edit { color: #1e3a8a; cursor: pointer; font-size: 20px; }
        .btn-del { color: #ef4444; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div class="topo">
    <i class="material-icons" onclick="location.href='admin.html'" style="cursor:pointer">arrow_back</i>
    <span style="font-weight:600">Gabinete Estratégico</span>
</div>

<div class="tabs">
    <button class="tab-btn active" id="tab-demandas" onclick="switchTab(event, 'demandas')"><i class="material-icons">handshake</i> Pedidos</button>
    <button class="tab-btn" id="tab-liderancas" onclick="switchTab(event, 'liderancas')"><i class="material-icons">groups</i> Lideranças</button>
    <button class="tab-btn" id="tab-agenda" onclick="switchTab(event, 'agenda')"><i class="material-icons">forum</i> Reuniões</button>
    <button class="tab-btn" id="tab-eventos" onclick="switchTab(event, 'eventos')"><i class="material-icons">event_available</i> Eventos</button>
</div>

<div class="container">
    
    <div class="dash-resumo">
        <div class="card-mini">
            <label>Total Lideranças</label>
            <span id="dashLidTotal">0</span>
        </div>
        <div class="card-mini">
            <label>Por Zona</label>
            <div class="dash-detalhe">
                <div class="det-urb">🏙 Urb: <span id="dashLidUrb">0</span></div>
                <div class="det-rur">🚜 Rur: <span id="dashLidRur">0</span></div>
            </div>
        </div>
        <div class="card-mini">
            <label>Bairros Atendidos</label>
            <span id="dashLidBairros">0</span>
        </div>
        <div class="card-mini">
            <label>Status Geral</label>
            <span style="font-size: 10px; color: #166534;">ATIVO</span>
        </div>
    </div>

    <div class="filtro-periodo">
        <div><label>Início</label><input type="date" id="filtroInicio" class="input-filtro" onchange="aplicarFiltros()"></div>
        <div><label>Fim</label><input type="date" id="filtroFim" class="input-filtro" onchange="aplicarFiltros()"></div>
        <i class="material-icons" style="color:#1e3a8a; margin-top:12px; cursor:pointer;" onclick="limparFiltros()">filter_list_off</i>
    </div>

    <div id="demandas" class="secao active">
        <div class="card-controle">
            <h4 id="titPedido">Novo Pedido</h4>
            <input type="hidden" id="pId">
            <input type="date" id="pData" class="form-controle">
            <input type="text" id="pNome" class="form-controle" placeholder="Nome do Cidadão">
            <input type="text" id="pBairro" class="form-controle" placeholder="Bairro/Comunidade">
            <select id="pZona" class="form-controle"><option value="Urbana">Zona Urbana</option><option value="Rural">Zona Rural</option></select>
            <select id="pLider" class="form-controle"><option value="">Direto com Vereador</option></select>
            <select id="pStatus" class="form-controle">
                <option value="Pendente">🔴 Pendente</option>
                <option value="Encaminhado">🟡 Encaminhado</option>
                <option value="Resolvido">🟢 Resolvido</option>
            </select>
            <input type="number" id="pGasto" class="form-controle" placeholder="Valor gasto (R$)">
            <textarea id="pDesc" class="form-controle" style="height:70px" placeholder="O que foi solicitado?"></textarea>
            <button class="btn-acao" id="btnSalvarP" onclick="salvarItem('crm_pedidos')">Salvar Pedido</button>
        </div>
        <div id="listaPedidos"></div>
    </div>

    <div id="liderancas" class="secao">
        <div class="card-controle">
            <h4 id="titLider">Cadastrar Liderança</h4>
            <input type="hidden" id="lId">
            <input type="text" id="lNome" class="form-controle" placeholder="Nome">
            <input type="tel" id="lFone" class="form-controle" placeholder="WhatsApp">
            <select id="lZona" class="form-controle"><option value="Urbana">Zona Urbana</option><option value="Rural">Zona Rural</option></select>
            <input type="text" id="lSetor" class="form-controle" placeholder="Bairro/Setor de Atuação">
            <button class="btn-acao" id="btnSalvarL" onclick="salvarItem('liderancas')">Salvar Líder</button>
        </div>
        <div id="listaLiderancas"></div>
    </div>

    <div id="agenda" class="secao">
        <div class="card-controle">
            <h4 id="titAgenda">Nova Reunião</h4>
            <input type="hidden" id="aId">
            <input type="date" id="aData" class="form-controle">
            <input type="text" id="aLocal" class="form-controle" placeholder="Local">
            <input type="text" id="aCom" class="form-controle" placeholder="Com quem?">
            <div style="margin-top:10px; background:#f1f5f9; padding:10px; border-radius:10px;">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="tempPauta" class="form-controle" style="margin-top:0" placeholder="Digite uma Pauta...">
                    <button onclick="addPautaLista()" style="background:#1e3a8a; color:white; border:none; padding:0 15px; border-radius:10px;">+</button>
                </div>
                <div id="listaPautasTemp"></div>
            </div>
            <button class="btn-acao" id="btnSalvarA" onclick="salvarItem('agenda_vereador')">Salvar Reunião</button>
        </div>
        <div id="listaAgenda"></div>
    </div>

    <div id="eventos" class="secao">
        <div class="card-controle">
            <h4 id="titEvento">Novo Evento</h4>
            <input type="hidden" id="eId">
            <input type="date" id="eData" class="form-controle">
            <input type="text" id="eLocal" class="form-controle" placeholder="Local">
            <input type="text" id="eTitulo" class="form-controle" placeholder="Evento">
            <button class="btn-acao" id="btnSalvarE" onclick="salvarItem('eventos_externos')">Salvar Evento</button>
        </div>
        <div id="listaEventos"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let pautasParaSalvar = [];

    function switchTab(evt, tabName) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        if(evt) evt.currentTarget.classList.add('active');
    }

    function aplicarFiltros() {
        const ini = document.getElementById("filtroInicio").value;
        const fim = document.getElementById("filtroFim").value;
        renderizarTudo(ini, fim);
    }

    function limparFiltros() {
        document.getElementById("filtroInicio").value = "";
        document.getElementById("filtroFim").value = "";
        renderizarTudo();
    }

    async function salvarItem(colecao) {
        let dados = {}; let id = "";
        if(colecao==='crm_pedidos'){
            id=document.getElementById("pId").value;
            dados={ dataPedido:document.getElementById("pData").value, nome:document.getElementById("pNome").value, bairro:document.getElementById("pBairro").value, zona:document.getElementById("pZona").value, lideranca:document.getElementById("pLider").value, status:document.getElementById("pStatus").value, gasto:parseFloat(document.getElementById("pGasto").value)||0, descricao:document.getElementById("pDesc").value };
        } else if(colecao==='liderancas'){
            id=document.getElementById("lId").value;
            dados={ nome:document.getElementById("lNome").value, fone:document.getElementById("lFone").value, zona:document.getElementById("lZona").value, setor:document.getElementById("lSetor").value };
        } else if(colecao==='agenda_vereador'){
            id=document.getElementById("aId").value;
            dados={ dataReuniao:document.getElementById("aData").value, local:document.getElementById("aLocal").value, comQuem:document.getElementById("aCom").value, pautas:pautasParaSalvar };
        } else if(colecao==='eventos_externos'){
            id=document.getElementById("eId").value;
            dados={ data:document.getElementById("eData").value, local:document.getElementById("eLocal").value, titulo:document.getElementById("eTitulo").value };
        }
        dados.criadoEm = firebase.firestore.FieldValue.serverTimestamp();
        if(id) await db.collection(colecao).doc(id).update(dados); else await db.collection(colecao).add(dados);
        alert("Sucesso!");
        limparCampos();
    }

    function limparCampos() {
        document.querySelectorAll('input, textarea').forEach(i => i.value = "");
        pautasParaSalvar = [];
        document.getElementById("pId").value = ""; document.getElementById("lId").value = "";
        document.getElementById("aId").value = ""; document.getElementById("eId").value = "";
    }

    function editarLid(id,nm,fn,zn,st) {
        document.getElementById("lId").value=id; document.getElementById("lNome").value=nm; document.getElementById("lFone").value=fn;
        document.getElementById("lZona").value=zn; document.getElementById("lSetor").value=st; window.scrollTo(0,0);
    }

    function renderizarTudo(ini = "", fim = "") {
        // Listagem de Pedidos
        db.collection("crm_pedidos").orderBy("dataPedido", "desc").onSnapshot(snap => {
            const lista = document.getElementById("listaPedidos"); lista.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                if ((!ini || d.dataPedido >= ini) && (!fim || d.dataPedido <= fim)) {
                    const corStatus = d.status === 'Resolvido' ? '#166534' : (d.status === 'Encaminhado' ? '#854d0e' : '#991b1b');
                    lista.innerHTML += `<div class="card-controle">
                        <div class="acoes-card">
                            <i class="material-icons btn-edit" onclick="editarPed('${doc.id}','${d.dataPedido}','${d.nome}','${d.bairro}','${d.zona}','${d.lideranca}','${d.status}',${d.gasto},'${d.descricao}')">edit</i>
                            <i class="material-icons btn-del" onclick="deletar('crm_pedidos','${doc.id}')">delete</i>
                        </div>
                        <div class="label-topo">${d.dataPedido} | <span style="color:${corStatus}; font-weight:700">● ${d.status}</span></div>
                        <strong>${d.nome}</strong><br><small>📍 ${d.bairro}</small>
                    </div>`;
                }
            });
        });

        // Listagem de Reuniões
        db.collection("agenda_vereador").orderBy("dataReuniao", "desc").onSnapshot(snap => {
            const lista = document.getElementById("listaAgenda"); lista.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                if ((!ini || d.dataReuniao >= ini) && (!fim || d.dataReuniao <= fim)) {
                    lista.innerHTML += `<div class="card-controle">
                        <div class="acoes-card">
                            <i class="material-icons btn-edit" onclick="editarReu('${doc.id}','${d.dataReuniao}','${d.local}','${d.comQuem}', ${JSON.stringify(d.pautas)})">edit</i>
                            <i class="material-icons btn-del" onclick="deletar('agenda_vereador','${doc.id}')">delete</i>
                        </div>
                        <strong>${d.comQuem}</strong>
                    </div>`;
                }
            });
        });
    }

    // LIDERANÇAS E DASHBOARD EXCLUSIVO
    db.collection("liderancas").orderBy("nome").onSnapshot(snap => {
        const lista = document.getElementById("listaLiderancas");
        const select = document.getElementById("pLider");
        lista.innerHTML = ""; select.innerHTML = '<option value="">Direto com Vereador</option>';
        
        let contLidTotal = 0, contLidUrb = 0, contLidRur = 0;
        let setores = new Set();
        
        snap.forEach(doc => {
            const l = doc.data(); 
            select.innerHTML += `<option value="${l.nome}">${l.nome}</option>`;
            
            contLidTotal++;
            if(l.zona === 'Urbana') contLidUrb++; else contLidRur++;
            if(l.setor) setores.add(l.setor);

            lista.innerHTML += `<div class="card-controle">
                <div class="acoes-card">
                    <i class="material-icons btn-edit" onclick="editarLid('${doc.id}','${l.nome}','${l.fone}','${l.zona}','${l.setor}')">edit</i>
                    <i class="material-icons btn-del" onclick="deletar('liderancas','${doc.id}')">delete</i>
                </div>
                <div class="label-topo">${l.zona}</div>
                <strong>${l.nome}</strong><br>
                <small>WhatsApp: ${l.fone}</small><br>
                <div class="badge-bairro">📍 ${l.setor || 'Não informado'}</div>
            </div>`;
        });
        
        // Atualiza Dashboard exclusivo de Lideranças
        document.getElementById("dashLidTotal").innerText = contLidTotal;
        document.getElementById("dashLidUrb").innerText = contLidUrb;
        document.getElementById("dashLidRur").innerText = contLidRur;
        document.getElementById("dashLidBairros").innerText = setores.size;
    });

    function deletar(col, id) { if(confirm("Excluir?")) db.collection(col).doc(id).delete(); }

    renderizarTudo();
</script>
</body>
</html>
