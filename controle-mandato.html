<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Estratégico - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* Estilos preservados exatamente como solicitado */
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 40px; }
        .header-admin { background:#1e3a8a; color:white; padding:40px 20px; text-align:center; border-radius:0 0 30px 30px; }
        .card-data { background:white; margin:15px; padding:20px; border-radius:20px; box-shadow:0 4px 10px rgba(0,0,0,0.05); }
        .stats-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px; }
        .stat-box { background:#f8fafc; padding:15px; border-radius:15px; text-align:center; border:1px solid #e2e8f0; }
        .stat-box h3 { margin:0; font-size:24px; color:#1e3a8a; }
        .stat-box p { margin:5px 0 0; font-size:11px; color:#64748b; font-weight:600; text-transform:uppercase; }
        .btn-voltar { display:block; text-align:center; margin:20px; color:#1e3a8a; text-decoration:none; font-weight:600; }
    </style>
</head>
<body>

<div class="header-admin">
    <h1 style="margin:0; font-size:20px;">Controle Estratégico</h1>
    <p style="opacity:0.8; font-size:12px;">Métricas do Mandato</p>
</div>

<div class="card-data">
    <h2 style="font-size:16px; color:#1e3a8a; margin-top:0;">Resumo de Atividades</h2>
    <div class="stats-grid">
        <div class="stat-box"><h3 id="count-noticias">0</h3><p>Notícias</p></div>
        <div class="stat-box"><h3 id="count-acoes">0</h3><p>Ações</p></div>
        <div class="stat-box"><h3 id="count-indicacoes">0</h3><p>Indicações</p></div>
        <div class="stat-box"><h3 id="count-requerimentos">0</h3><p>Requerimentos</p></div>
        <div class="stat-box"><h3 id="count-projetos">0</h3><p>Projetos</p></div>
        <div class="stat-box"><h3 id="count-sessoes">0</h3><p>Sessões</p></div>
    </div>
</div>

<a href="admin.html" class="btn-voltar">Voltar ao Painel</a>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", 
        authDomain: "gabinete-do-povo.firebaseapp.com", 
        projectId: "gabinete-do-povo" 
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // Função para contar documentos em tempo real
    function monitorarColecao(colecao, elementId) {
        db.collection(colecao).onSnapshot(snapshot => {
            document.getElementById(elementId).innerText = snapshot.size;
        }, error => {
            console.error("Erro ao ler " + colecao, error);
        });
    }

    // Inicializa os contadores
    monitorarColecao("noticias", "count-noticias");
    monitorarColecao("acoes-atendidas", "count-acoes");
    monitorarColecao("indicacoes", "count-indicacoes");
    monitorarColecao("requerimentos", "count-requerimentos");
    monitorarColecao("projetos", "count-projetos");
    monitorarColecao("sessoes", "count-sessoes");
</script>

</body>
</html>
