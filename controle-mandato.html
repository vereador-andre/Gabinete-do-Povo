<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Mandato - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; padding-bottom: 40px; }
        .topo { background:#1e3a8a; color:white; padding:20px; display:flex; align-items:center; gap:15px; position: sticky; top:0; z-index:100; }
        .tabs { display: flex; background: white; padding: 10px; gap: 5px; border-bottom: 1px solid #e2e8f0; overflow-x: auto; }
        .tab-btn { flex:none; min-width: 100px; padding: 10px; border-radius: 12px; border: none; background: #f1f5f9; color: #64748b; font-size: 11px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .tab-btn.active { background: #1e3a8a; color: white; }
        .container { padding: 15px; }
        .secao { display: none; }
        .secao.active { display: block; }
        .card-controle { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .form-controle { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; margin-top: 8px; box-sizing: border-box; font-family: 'Poppins'; font-size: 14px; outline: none; }
        .btn-acao { background: #1e3a8a; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; margin-top: 15px; font-weight: 600; cursor: pointer; }
        .label-topo { font-size: 10px; color: #94a3b8; font-weight: 600; text-transform: uppercase; }
        .acoes-card { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
        .btn-edit { color: #1e3a8a; cursor: pointer; font-size: 20px; }
        .btn-del { color: #ef4444; cursor: pointer; font-size: 20px; }
        
        /* Estilos Pauta */
        .pauta-item { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 8px; border-radius: 8px; margin-top: 5px; font-size: 13px; border: 1px solid #e2e8f0; }
        .status-select { font-size: 11px; padding: 4px; border-radius: 5px; border: 1px solid #cbd5e1; background: white; }
        .badge-status { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-top: 4px; display: inline-block; }
    </style>
</head>
<body>

<div class="topo">
    <i class="material-icons" onclick="location.href='admin.html'" style="cursor:pointer">arrow_back</i>
    <span style="font-weight:600">Controle Estratégico</span>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab(event, 'demandas')"><i class="material-icons">handshake</i> Pedidos</button>
    <button class="tab-btn" onclick="switchTab(event, 'liderancas')"><i class="material-icons">groups</i> Lideranças</button>
    <button class="tab-btn" onclick="switchTab(event, 'agenda')"><i class="material-icons">forum</i> Reuniões</button>
    <button class="tab-btn" onclick="switchTab(event, 'eventos')"><i class="material-icons">event_available</i> Eventos</button>
</div>

<div class="container">
    
    <div id="demandas" class="secao active">
        <div class="card-controle">
            <h4 id="titPedido">Novo Registro de Pedido</h4>
            <input type="hidden" id="pId">
            <label class="label-topo">Data do Pedido</label>
            <input type="date" id="pData" class="form-controle">
            <input type="text" id="pNome" class="form-controle" placeholder="Nome do Cidadão">
            <input type="text" id="pBairro" class="form-controle" placeholder="Bairro/Comunidade">
            <select id="pZona" class="form-controle"><option value="Urbana">Zona Urbana</option><option value="Rural">Zona Rural</option></select>
            <select id="pLider" class="form-controle"><option value="">Direto com Vereador</option></select>
            <input type="number" id="pGasto" class="form-controle" placeholder="Valor gasto (R$)">
            <textarea id="pDesc" class="form-controle" style="height:70px" placeholder="Descrição do Pedido"></textarea>
            <button class="btn-acao" onclick="salvarItem('crm_pedidos')">Salvar Pedido</button>
        </div>
        <div id="listaPedidos"></div>
    </div>

    <div id="liderancas" class="secao">
        <div class="card-controle">
            <h4 id="titLider">Cadastrar Líder</h4>
            <input type="hidden" id="lId">
            <input type="text" id="lNome" class="form-controle" placeholder="Nome">
            <input type="tel" id="lFone" class="form-controle" placeholder="WhatsApp">
            <select id="lZona" class="form-controle"><option value="Urbana">Urbana</option><option value="Rural">Rural</option></select>
            <input type="number" id="lGastoFixo" class="form-controle" placeholder="Custo Fixo (R$)">
            <button class="btn-acao" onclick="salvarItem('liderancas')">Salvar Liderança</button>
        </div>
        <div id="listaLiderancas"></div>
    </div>

    <div id="agenda" class="secao">
        <div class="card-controle">
            <h4 id="titAgenda">Nova Reunião</h4>
            <input type="hidden" id="aId">
            <label class="label-topo">Data</label>
            <input type="date" id="aData" class="form-controle">
            <input type="text" id="aLocal" class="form-controle" placeholder="Local da Reunião">
            <input type="text" id="aCom" class="form-controle" placeholder="Com quem? (Secretário, Moradores...)">
            
            <div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">
                <label class="label-topo">Adicionar Pautas</label>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="tempPauta" class="form-controle" placeholder="Escreva a pauta...">
                    <button class="btn-acao" style="width:50px; margin-top:8px;" onclick="addPauta()"><i class="material-icons">add</i></button>
                </div>
                <div id="pautasTemporarias" style="margin-top:10px;"></div>
            </div>

            <button class="btn-acao" style="background:#0f172a" onclick="salvarReuniao()">Salvar Reunião Completa</button>
        </div>
        <div id="listaAgenda"></div>
    </div>

    <div id="eventos" class="secao">
        <div class="card-controle">
            <h4 id="titEvento">Evento Externo</h4>
            <input type="hidden" id="eId">
            <input type="date" id="eData" class="form-controle">
            <input type="text" id="eTitulo" class="form-controle" placeholder="Título do Evento">
            <button class="btn-acao" onclick="salvarItem('eventos_externos')">Salvar Evento</button>
        </div>
        <div id="listaEventos"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let pautasParaSalvar = [];
    let lideresNomes = [];

    function switchTab(evt, tabName) {
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function addPauta() {
        const pautaTxt = document.getElementById("tempPauta").value;
        if(!pautaTxt) return;
        pautasParaSalvar.push({ texto: pautaTxt, status: "Não discutido" });
        document.getElementById("tempPauta").value = "";
        renderPautasTemp();
    }

    function renderPautasTemp() {
        const div = document.getElementById("pautasTemporarias");
        div.innerHTML = pautasParaSalvar.map((p, i) => `
            <div class="pauta-item">${p.texto} <i class="material-icons" style="color:red; font-size:16px; cursor:pointer" onclick="pautasParaSalvar.splice(${i},1);renderPautasTemp()">delete</i></div>
        `).join('');
    }

    async function salvarReuniao() {
        const id = document.getElementById("aId").value;
        const dados = {
            data: document.getElementById("aData").value,
            local: document.getElementById("aLocal").value,
            comQuem: document.getElementById("aCom").value,
            pautas: pautasParaSalvar,
            criadoEm: firebase.firestore.FieldValue.serverTimestamp()
        };
        if(!dados.data || !dados.comQuem) return alert("Preencha data e participantes");
        
        if(id) await db.collection("agenda_vereador").doc(id).update(dados);
        else await db.collection("agenda_vereador").add(dados);
        
        alert("Reunião salva!");
        location.reload();
    }

    async function atualizarStatusPauta(reuniaoId, pautaIndex, novoStatus) {
        const doc = await db.collection("agenda_vereador").doc(reuniaoId).get();
        let pautas = doc.data().pautas;
        pautas[pautaIndex].status = novoStatus;
        await db.collection("agenda_vereador").doc(reuniaoId).update({ pautas: pautas });
    }

    async function salvarItem(colecao) {
        let dados = {};
        let id = "";
        if(colecao === 'liderancas') {
            id = document.getElementById("lId").value;
            dados = { nome: document.getElementById("lNome").value, fone: document.getElementById("lFone").value, zona: document.getElementById("lZona").value, gastoFixo: parseFloat(document.getElementById("lGastoFixo").value) || 0 };
        } else if(colecao === 'crm_pedidos') {
            id = document.getElementById("pId").value;
            dados = { data: document.getElementById("pData").value, nome: document.getElementById("pNome").value, bairro: document.getElementById("pBairro").value, zona: document.getElementById("pZona").value, lideranca: document.getElementById("pLider").value || "Direto", gasto: parseFloat(document.getElementById("pGasto").value) || 0, descricao: document.getElementById("pDesc").value };
        } else if(colecao === 'eventos_externos') {
            id = document.getElementById("eId").value;
            dados = { data: document.getElementById("eData").value, titulo: document.getElementById("eTitulo").value };
        }
        dados.criadoEm = firebase.firestore.FieldValue.serverTimestamp();
        if(id) await db.collection(colecao).doc(id).update(dados);
        else await db.collection(colecao).add(dados);
        location.reload();
    }

    function deletar(col, id) { if(confirm("Excluir?")) db.collection(col).doc(id).delete().then(() => location.reload()); }

    // RENDERIZAÇÃO
    db.collection("liderancas").onSnapshot(snap => {
        const lista = document.getElementById("listaLiderancas");
        const select = document.getElementById("pLider");
        lista.innerHTML = ""; select.innerHTML = '<option value="">Direto</option>';
        snap.forEach(doc => {
            const l = doc.data();
            select.innerHTML += `<option value="${l.nome}">${l.nome}</option>`;
            lista.innerHTML += `<div class="card-controle"><div class="acoes-card"><i class="material-icons btn-del" onclick="deletar('liderancas','${doc.id}')">delete</i></div><strong>${l.nome}</strong><br><small>${l.zona}</small></div>`;
        });
    });

    db.collection("crm_pedidos").orderBy("criadoEm", "desc").onSnapshot(snap => {
        const lista = document.getElementById("listaPedidos");
        lista.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            lista.innerHTML += `<div class="card-controle"><div class="acoes-card"><i class="material-icons btn-del" onclick="deletar('crm_pedidos','${doc.id}')">delete</i></div><small>${d.data || ''}</small><br><strong>${d.nome}</strong><p style="font-size:12px">${d.descricao}</p></div>`;
        });
    });

    db.collection("agenda_vereador").orderBy("data", "desc").onSnapshot(snap => {
        const lista = document.getElementById("listaAgenda");
        lista.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            let pautasHtml = d.pautas.map((p, idx) => `
                <div class="pauta-item" style="flex-direction:column; align-items:flex-start;">
                    <span>${p.texto}</span>
                    <select class="status-select" onchange="atualizarStatusPauta('${doc.id}', ${idx}, this.value)">
                        <option value="Não discutido" ${p.status=='Não discutido'?'selected':''}>Não discutido</option>
                        <option value="Atendido Total" ${p.status=='Atendido Total'?'selected':''}>Atendido Total</option>
                        <option value="Atendido Parcial" ${p.status=='Atendido Parcial'?'selected':''}>Atendido Parcial</option>
                        <option value="Não atendido" ${p.status=='Não atendido'?'selected':''}>Não atendido</option>
                    </select>
                </div>
            `).join('');
            
            lista.innerHTML += `
                <div class="card-controle">
                    <div class="acoes-card"><i class="material-icons btn-del" onclick="deletar('agenda_vereador','${doc.id}')">delete</i></div>
                    <div class="label-topo">📅 ${d.data} | 📍 ${d.local}</div>
                    <strong>Reunião: ${d.comQuem}</strong>
                    <div style="margin-top:10px;">${pautasHtml}</div>
                </div>`;
        });
    });

    db.collection("eventos_externos").onSnapshot(snap => {
        const lista = document.getElementById("listaEventos");
        lista.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            lista.innerHTML += `<div class="card-controle"><div class="acoes-card"><i class="material-icons btn-del" onclick="deletar('eventos_externos','${doc.id}')">delete</i></div><strong>${d.titulo}</strong></div>`;
        });
    });
</script>
</body>
</html>
