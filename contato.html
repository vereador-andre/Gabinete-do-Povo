<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sua Voz no Gabinete</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

/* TOPO */
.topo {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.voltar {
  background:#1e293b;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
}

/* FORM */
select, input, textarea {
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:none;
  font-size:14px;
}

textarea {
  min-height:120px;
}

/* BOTÃO */
button {
  margin-top:20px;
  width:100%;
  padding:14px;
  background:#22c55e;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
}

button:active {
  transform:scale(0.97);
}

/* SUCESSO */
.sucesso {
  display:none;
  margin-top:15px;
  background:#16a34a;
  padding:12px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="voltar" onclick="voltar()">←</div>
  <div><b>Sua Voz no Gabinete</b></div>
</div>

<!-- FORM -->
<form id="formContato">

<select name="tipo">
  <option>Sugestão</option>
  <option>Crítica</option>
  <option>Elogio</option>
  <option>Reclamação</option>
  <option>Solicitação de visita</option>
</select>

<input type="text" name="nome" placeholder="Seu nome" required>
<input type="text" name="bairro" placeholder="Seu bairro">

<textarea name="mensagem" placeholder="Escreva sua mensagem" required></textarea>

<button type="submit">Enviar mensagem</button>

</form>

<div class="sucesso" id="msgSucesso">
  ✅ Mensagem enviada com sucesso!
</div>

<!-- LOGO -->
<div style="margin-top:40px; text-align:center;">
  <img src="logo.png" style="width:100px; opacity:0.7;">
</div>

<script>
const form = document.getElementById("formContato");

form.addEventListener("submit", function(e){
  e.preventDefault();

  fetch("https://formspree.io/f/SEUCODIGO", {
    method: "POST",
    body: new FormData(form),
    headers: {
      'Accept': 'application/json'
    }
  }).then(() => {
    form.reset();
    document.getElementById("msgSucesso").style.display = "block";
  });
});

function voltar(){
  window.history.back();
}
</script>

</body>
</html>
