<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fale Conosco</title>

<style>
body {
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

input, textarea {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button {
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>Fale com o Gabinete</h2>

<input type="text" id="nome" placeholder="Seu nome">
<textarea id="mensagem" placeholder="Digite sua mensagem"></textarea>

<button onclick="enviar()">Enviar</button>

<script>
function enviar(){
  let nome = document.getElementById("nome").value;
  let mensagem = document.getElementById("mensagem").value;

  let texto = `Olá, sou ${nome}. ${mensagem}`;
  
  let url = "https://wa.me/5584998193637?text=" + encodeURIComponent(texto);

  window.open(url, "_blank");
}
</script>

</body>
</html>
