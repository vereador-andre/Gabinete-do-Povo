<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sua Voz no Gabinete</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#0f172a;
  color:white;
  padding:20px;
}

/* TOPO */
.topo {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:20px;
}

.voltar {
  background:#1e293b;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
}

.titulo-topo {
  font-size:18px;
  font-weight:600;
}

/* FORM */
select, input, textarea {
  width:100%;
  padding:14px;
  margin-top:12px;
  border-radius:12px;
  border:none;
  font-size:14px;
}

textarea {
  min-height:120px;
}

/* BOTÃO */
button {
  margin-top:20px;
  width:100%;
  padding:14px;
  background:#22c55e;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
}

button:active {
  transform:scale(0.97);
}
</style>
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div class="voltar" onclick="voltar()">←</div>
  <div class="titulo-topo">Sua Voz no Gabinete</div>
</div>

<!-- FORM -->
<select id="tipo">
  <option>Sugestão</option>
  <option>Crítica</option>
  <option>Elogio</option>
  <option>Reclamação</option>
  <option>Solicitação de visita</option>
</select>

<input type="text" id="nome" placeholder="Seu nome">
<input type="text" id="bairro" placeholder="Seu bairro">

<textarea id="mensagem" placeholder="Escreva sua mensagem"></textarea>

<button onclick="enviar()">Enviar mensagem</button>

<script>
function enviar(){
  let tipo = document.getElementById("tipo").value;
  let nome = document.getElementById("nome").value;
  let bairro = document.getElementById("bairro").value;
  let mensagem = document.getElementById("mensagem").value;

  let assunto = "Contato do App - Gabinete do Povo";

  let corpo = `
Tipo: ${tipo}
Nome: ${nome}
Bairro: ${bairro}
Mensagem: ${mensagem}
  `;

  let mailto = `mailto:andrekelly.santos@hotmail.com?subject=${encodeURIComponent(assunto)}&body=${encodeURIComponent(corpo)}`;

  window.location.href = mailto;

  setTimeout(() => {
    alert("Mensagem enviada com sucesso!");
  }, 500);
}

function voltar(){
  window.history.back();
}
</script>
</body>
</html>
