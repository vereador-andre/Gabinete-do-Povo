<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliações do Mandato</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin:0; font-family:'Poppins', sans-serif; background:#f1f5f9; }
        .topo { background:#1e3a8a; color:white; padding:20px; display:flex; align-items:center; gap:15px; }
        .container { padding: 15px; }
        /* Card com borda laranja para destacar que é Avaliação */
        .card-msg { background:white; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 4px 10px rgba(0,0,0,0.05); border-left: 5px solid #f59e0b; }
        
        .status-select { 
            width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; 
            font-family: inherit; font-size: 13px; font-weight: 600; border: 1px solid #e2e8f0;
            background-color: #fff;
        }

        .tag-avaliacao {
            background: #fff7ed; color: #c2410c; padding: 4px 8px; border-radius: 6px;
            font-size: 10px; font-weight: 600; text-transform: uppercase; display: inline-flex; align-items: center; gap: 4px;
        }

        .acoes-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 10px; border-top: 1px solid #f1f5f9; }
    </style>
</head>
<body>
<div class="topo">
    <i class="material-icons" onclick="location.href='admin.html'" style="cursor:pointer">arrow_back</i>
    <span>Avaliações do Público</span>
</div>
<div class="container" id="lista">Carregando avaliações...</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", 
        authDomain: "gabinete-do-povo.firebaseapp.com", 
        projectId: "gabinete-do-povo" 
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    function mudarStatus(id, novoStatus) {
        db.collection("avaliacoes_mandato").doc(id).update({ status: novoStatus });
    }

    db.collection("avaliacoes_mandato").orderBy("criadoEm", "desc").onSnapshot(snapshot => {
        const lista = document.getElementById("lista");
        lista.innerHTML = "";

        if (snapshot.empty) {
            lista.innerHTML = "<p style='text-align:center; color:#64748b; margin-top:20px;'>Nenhuma avaliação recebida ainda.</p>";
            return;
        }

        snapshot.forEach(doc => {
            const m = doc.data();
            const id = doc.id;
            const status = m.status || "Novo";

            lista.innerHTML += `
                <div class="card-msg">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="tag-avaliacao"><i class="material-icons" style="font-size:12px;">stars</i> Avaliação</div>
                        <span style="font-size:12px; color:#94a3b8;">${m.data || ''}</span>
                    </div>
                    
                    <p style="font-size:14px; margin:15px 0; color:#1e293b; line-height:1.5;">${m.mensagem}</p>
                    
                    <label style="font-size:11px; font-weight:600; color:#64748b;">STATUS DA ANÁLISE:</label>
                    <select class="status-select" onchange="mudarStatus('${id}', this.value)">
                        <option value="Novo" ${status=='Novo'?'selected':''}>🆕 Novo Comentário</option>
                        <option value="Lido" ${status=='Lido'?'selected':''}>👁️ Lido pelo Gabinete</option>
                        <option value="Em Analise" ${status=='Em Analise'?'selected':''}>📝 Em Análise</option>
                        <option value="Arquivado" ${status=='Arquivado'?'selected':''}>📁 Arquivado/Resolvido</option>
                    </select>

                    <div class="acoes-footer">
                        <small style="color:#cbd5e1;">REF: ${id.substring(0,6)}</small>
                        <button onclick="if(confirm('Excluir esta avaliação permanentemente?')) db.collection('avaliacoes_mandato').doc('${id}').delete()" style="border:none; background:none; color:#ef4444; display:flex; align-items:center; gap:5px; cursor:pointer; font-weight:600; font-size:13px;">
                            <i class="material-icons" style="font-size:18px;">delete_outline</i> Excluir
                        </button>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
