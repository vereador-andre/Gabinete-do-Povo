<div class="form">
    <div class="card">
        <label>Título</label>
        <input type="text" id="titulo">
        
        <label>Data</label>
        <input type="date" id="data"> <label>Link da Imagem ou Documento</label>
        <input type="text" id="imagem" placeholder="URL da imagem">

        <label>Descrição/Texto</label>
        <textarea id="texto"></textarea>
        
        <button class="btn-salvar" onclick="salvar()">Publicar</button>
    </div>
</div>

<script>
// ... (Configuração do Firebase igual) ...

function salvar() {
    const t = document.getElementById("titulo").value;
    const d = document.getElementById("data").value;
    const i = document.getElementById("imagem").value;
    const tx = document.getElementById("texto").value;

    // MUDE O NOME DA COLEÇÃO ABAIXO DE ACORDO COM O ARQUIVO
    db.collection("indicacao").add({ 
        titulo: t, data: d, imagem: i, texto: tx,
        criadoEm: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => { alert("Postado!"); history.back(); });
}
</script>
