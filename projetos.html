<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5PL1D78HGL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5PL1D78HGL');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #f1f5f9; padding-bottom: 30px; }
        .header-busca { background: #1e3a8a; color: white; padding: 20px; border-radius: 0 0 25px 25px; position: sticky; top: 0; z-index: 100; }
        .nav-top { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .search-box { background: white; border-radius: 15px; display: flex; align-items: center; padding: 5px 15px; }
        .search-box input { border: none; padding: 10px; width: 100%; outline: none; font-family: 'Poppins'; }
        .lista-container { padding: 20px; }
        .item-card { background: white; border-radius: 18px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid #1e3a8a; }
        .item-card h3 { margin: 0; font-size: 16px; color: #1e3a8a; }
        .status-tag { font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 4px 10px; border-radius: 8px; background: #e2e8f0; color: #475569; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
<div class="header-busca">
    <div class="nav-top">
        <a href="app.html" style="color:white; text-decoration:none;"><i class="material-icons">chevron_left</i></a>
        <span style="font-weight:600">Projetos de Lei</span>
    </div>
    <div class="search-box">
        <i class="material-icons" style="color:#64748b">search</i>
        <input type="text" id="inputBusca" placeholder="Buscar projeto..." onkeyup="filtrar()">
    </div>
</div>
<div class="lista-container" id="listaItens">
    <div class="item-card">
        <h3>PL Nº 000/2026</h3>
        <p style="font-size: 13px; color: #64748b; margin-top: 10px;">Ementa do projeto de lei detalhando o benefício para Areia Branca.</p>
        <span class="status-tag">Em Tramitação</span>
    </div>
</div>
<script>
    function filtrar() {
        let input = document.getElementById('inputBusca').value.toLowerCase();
        let cards = document.getElementsByClassName('item-card');
        for (let i = 0; i < cards.length; i++) {
            let txt = cards[i].innerText.toLowerCase();
            cards[i].style.display = txt.includes(input) ? "block" : "none";
        }
    }
</script>
</body>
</html>
