<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projetos de Lei - André de Dedé</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #1e3a8a; --accent: #6d28d9; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #f1f5f9; padding-bottom: 100px; }
        .topo { background: var(--primary); color: white; padding: 20px; display: flex; align-items: center; gap: 15px; border-radius: 0 0 25px 25px; }
        .container { padding: 20px 15px; }
        .projeto-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .projeto-card::after { content: ''; position: absolute; top: 0; right: 0; width: 40px; height: 40px; background: var(--accent); opacity: 0.1; border-radius: 0 0 0 40px; }
        .projeto-titulo { font-size: 16px; font-weight: 600; color: var(--primary); margin-bottom: 10px; padding-right: 20px; }
        .projeto-resumo { font-size: 13px; color: #475569; line-height: 1.6; }
        .tag-lei { display: inline-flex; align-items: center; gap: 5px; background: #ede9fe; color: #6d28d9; font-size: 10px; font-weight: 700; padding: 5px 12px; border-radius: 50px; margin-top: 15px; }
    </style>
</head>
<body>
<div class="topo"><i class="material-icons" onclick="history.back()">arrow_back</i><span>Projetos de Lei</span></div>
<div class="container" id="lista-projetos">Carregando...</div>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAS_4zDyNAMXGAF9tp-30QIp0ywRJhIjLc", authDomain: "gabinete-do-povo.firebaseapp.com", projectId: "gabinete-do-povo" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    db.collection("projetos").orderBy("criadoEm", "desc").onSnapshot(s => {
        const l = document.getElementById("lista-projetos"); l.innerHTML = "";
        s.forEach(d => {
            const i = d.data();
            l.innerHTML += `
                <div class="projeto-card">
                    <div class="projeto-titulo">${i.titulo}</div>
                    <div class="projeto-resumo">${i.descricao || i.texto || ''}</div>
                    <div class="tag-lei"><i class="material-icons" style="font-size:14px">gavel</i> PROJETO DE LEI</div>
                </div>`;
        });
    });
</script>
</body>
</html>
